<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打字机事件编辑器 v9 - 魔法书</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'zpix', 'Microsoft YaHei', 'SimHei', sans-serif;
  background: #1a1a2e;
  color: #eee;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* === Buttons (global) === */
button { font-family: 'zpix', 'Microsoft YaHei', sans-serif; }

/* === Top Bar === */
.top-bar {
  background: linear-gradient(135deg, #9c27b0, #6a1b9a);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 100;
}
.top-bar h1 { font-size: 18px; color: #fff; }
.btn {
  font-family: 'zpix', 'Microsoft YaHei', sans-serif;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff; padding: 5px 12px;
  border-radius: 4px; cursor: pointer;
  font-size: 13px; transition: all 0.15s;
}
.btn:hover { background: rgba(255,255,255,0.3); }
.btn:active { transform: scale(0.96); }
.btn-sm { padding: 3px 8px; font-size: 12px; }
.btn-danger { background: rgba(244,67,54,0.3); border-color: #f44336; }
.btn-success { background: rgba(76,175,80,0.3); border-color: #4CAF50; }
.btn-primary { background: rgba(33,150,243,0.3); border-color: #2196F3; }
.btn-toggle.active { background: rgba(76,175,80,0.5); border-color: #4CAF50; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn:disabled:hover { background: rgba(255,255,255,0.15); }

/* === Main Layout === */
.main-area {
  flex: 1; display: flex; overflow: hidden;
}

/* === Left Panel - Canvas Preview === */
.preview-panel {
  width: 63%; min-width: 400px;
  display: flex; flex-direction: column;
  border-right: 2px solid #333;
}
.preview-header {
  padding: 6px 12px;
  background: #16213e;
  display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap;
  border-bottom: 1px solid #333;
}
.preview-header label { font-size: 12px; color: #aaa; }
.preview-header input[type="number"] {
  width: 55px; padding: 2px 4px;
  background: #0f3460; color: #fff;
  border: 1px solid #444; border-radius: 3px; font-size: 12px;
}
.canvas-wrapper {
  flex: 1; position: relative;
  overflow: hidden;
  background: #1a1a2e;
}
#previewCanvas {
  position: absolute; top: 30px; left: 30px;
  width: 960px; height: 540px;
}
.canvas-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
}

/* Grid coordinates overlay */
.coord-overlay {
  position: absolute; top: 0; left: 30px;
  display: flex; pointer-events: none;
}
.coord-overlay-h { display: flex; }
.coord-overlay-v {
  position: absolute; top: 30px; left: 0;
  display: flex; flex-direction: column; pointer-events: none;
}
.coord-cell {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #666;
  user-select: none;
}

/* === Right Panel - Block List === */
.block-panel {
  width: calc(42% - 60px); min-width: 390px;
  display: flex; flex-direction: column;
  background: #1e1e3a;
}
.panel-toolbar {
  padding: 8px 10px;
  background: #16213e;
  display: flex; gap: 6px; flex-wrap: wrap;
  border-bottom: 1px solid #333;
  align-items: center;
}
.remark-input {
  flex: 1; min-width: 120px;
  padding: 4px 8px; background: #0f3460;
  color: #fff; border: 1px solid #444; border-radius: 3px;
  font-size: 12px;
}
.remark-input::placeholder { color: #666; }

/* Block list scroll area */
.block-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 8px;
  position: relative;
}
.block-list { 
  display: flex; flex-direction: column;
  gap: 8px;
  padding-bottom: 200px;
}

/* Single Block */
.block-item {
  border-radius: 6px;
  flex-shrink: 0;
}
.block-item.selected { outline: 2px solid #4CAF50; outline-offset: -2px; }
.block-item.selected .block-header { background: #1a3a0a !important; border-color: #4CAF50 !important; }
.block-item.highlighted .block-header { background: #1a3a0a !important; }
.block-header {
  height: 40px;
  background: #000;
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; padding: 0 10px;
  user-select: none;
  border: 2px solid transparent;
  transition: border-color 0.15s;
}
.block-header:hover { border-color: #444; }
.block-header .block-title {
  font-size: 18px; font-weight: bold;
  margin-left: 8px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 420px;
}
.block-header .expand-arrow {
  margin-left: auto; font-size: 16px; color: #888;
  transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
.block-item.expanded .expand-arrow { transform: rotate(180deg); }
.block-item.playing .block-header { background: #3a1a0a !important; border-color: #ff9800 !important; }
.drag-handle {
  width: 14px; height: 40px;
  background: rgba(255,255,255,0.15);
  border-radius: 3px; margin-right: 8px;
  cursor: grab; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.6; transition: opacity 0.15s;
}
.drag-handle:hover { opacity: 1; background: rgba(255,255,255,0.3); }
.drag-handle:active { cursor: grabbing; }
.drag-handle-inner {
  width: 4px; height: 20px;
  background: repeating-linear-gradient(#888, #888 2px, transparent 2px, transparent 5px);
  border-radius: 2px;
}

/* SortableJS drag styles */
.sortable-ghost {
  opacity: 0.4;
}
.sortable-drag {
  opacity: 0.9;
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

/* Expanded content area */
.block-content {
  max-height: 0; overflow: hidden;
  background: #111;
  border-radius: 0 0 6px 6px;
  transition: max-height 0.35s cubic-bezier(0.36, 0, 0.66, -0.56),
              padding 0.25s ease-in;
  padding: 0 10px;
}
.block-item.expanded .block-content {
  max-height: 600px; padding: 10px;
}

/* Typewriter block specific fields */
.tw-fields {
  display: grid; grid-template-columns: 1fr 180px; gap: 10px;
  align-items: start;
}
.text-edit-area textarea {
  width: 100%; height: 160px;
  background: #0a0a1a; color: #fff;
  border: 1px solid #333; border-radius: 4px;
  padding: 8px; font-size: 14px; resize: vertical;
  font-family: 'zpix', 'Microsoft YaHei', monospace; line-height: 1.5;
}
.text-edit-area textarea:focus { outline: none; border-color: #9c27b0; }
.symbol-btns {
  display: grid; grid-template-columns: repeat(8, 1fr);
  gap: 3px;
}
.sym-btn {
  font-family: 'zpix', 'Microsoft YaHei', sans-serif;
  padding: 4px 2px; font-size: 13px;
  background: #1a1a3a; border: 1px solid #333;
  color: #ddd; border-radius: 3px; cursor: pointer;
  text-align: center;
}
.sym-btn:hover { background: #2a2a5a; }
.sym-btn.pair { color: #ffb74d; }
.sym-btn.sym-functional { color: #64b5f6; }

.fields-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  margin-top: 6px;
}
.field-row label {
  font-size: 11px; color: #aaa; display: block; margin-bottom: 2px;
}
.field-row input[type="text"], .field-row input[type="number"] {
  width: 100%; padding: 3px 6px;
  background: #0a0a1a; color: #fff;
  border: 1px solid #333; border-radius: 3px; font-size: 12px;
}
.field-row input:focus { outline: none; border-color: #9c27b0; }

.bool-toggles {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4px; margin-top: 6px;
}
.toggle-btn {
  padding: 3px 6px; font-size: 11px;
  background: #222; border: 1px solid #444;
  color: #999; border-radius: 3px; cursor: pointer; text-align: left;
}
.toggle-btn.active { background: #1a4d2e; border-color: #4CAF50; color: #8bc34a; }
.toggle-btn:hover:not(.active) { border-color: #666; }

.sound-layer-area { margin-top: 6px; }
.sl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.sl-btn {
  padding: 4px 6px; font-size: 11px;
  background: #222; border: 1px solid #444;
  color: #999; border-radius: 3px; cursor: pointer; text-align: center;
}
.sl-btn.active { background: #1a3a5e; border-color: #2196F3; color: #64b5f6; }
.section-label { font-size: 11px; color: #888; margin-top: 4px; margin-bottom: 2px; }
.action-btns { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }
.action-btns .btn { font-size: 11px; padding: 4px 10px; }

/* Event block fields */
.event-textarea {
  width: 100%; height: 120px;
  background: #0a0a1a; color: #fff;
  border: 1px solid #333; border-radius: 4px;
  padding: 8px; font-size: 14px; resize: vertical;
  font-family: monospace;
}

/* === Style Panel (Right Sidebar) === */
.style-sidebar {
  width: 170px; background: #111;
  border-left: 1px solid #333;
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.style-header {
  padding: 8px; font-size: 13px; font-weight: bold;
  background: #1a1a3a; border-bottom: 1px solid #333;
  text-align: center;
}
.style-list { padding: 4px; flex: 1; }
.style-item {
  display: flex; align-items: center; padding: 4px 6px;
  margin-bottom: 3px; background: #1a1a2e;
  border-radius: 3px; cursor: pointer; font-size: 12px;
  gap: 4px;
}
.style-item:hover { background: #252545; }
.style-color-swatch {
  width: 14px; height: 14px; border-radius: 2px;
  border: 1px solid #555; flex-shrink: 0;
}
.style-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.style-del { 
  font-size: 10px; color: #f44336; cursor: pointer; 
  padding: 0 2px; border: 1px solid #f44336; border-radius: 2px;
  line-height: 14px;
}
.style-modify {
  font-size: 10px; color: #2196F3; cursor: pointer;
  padding: 0 2px; border: 1px solid #2196F3; border-radius: 2px;
  line-height: 14px; margin-right: 2px;
}

/* === Modals === */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: #1a1a2e; border: 2px solid #444;
  border-radius: 8px; width: 700px; max-height: 80vh;
  display: flex; flex-direction: column;
}
.modal-head {
  padding: 12px 16px; font-size: 16px; font-weight: bold;
  border-bottom: 1px solid #333; display: flex; justify-content: space-between;
}
.modal-close {
  background: none; border: none; color: #888; font-size: 22px;
  cursor: pointer; padding: 0 6px; line-height: 1;
}
.modal-body { padding: 16px; flex: 1; overflow-y: auto; }
.modal-foot {
  padding: 12px 16px; border-top: 1px solid #333;
  display: flex; gap: 8px; justify-content: flex-end;
}
.modal-textarea {
  width: 100%; height: 350px;
  background: #000; color: #0f0;
  border: 1px solid #444; border-radius: 4px;
  padding: 10px; font-family: 'Consolas', 'Courier New', monospace;
  font-size: 13px; resize: none;
}

/* Style creation modal */
.style-form-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.style-form-row label { font-size: 13px; min-width: 100px; }
.style-form-row input, .style-form-row select {
  padding: 4px 8px; background: #0a0a1a; color: #fff;
  border: 1px solid #444; border-radius: 3px;
}
.style-effect-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.style-effect-tab {
  padding: 4px 12px; background: #222; border: 1px solid #444;
  color: #aaa; border-radius: 3px; cursor: pointer; font-size: 12px;
}
.style-effect-tab.active { background: #1a3a5e; border-color: #2196F3; color: #64b5f6; }

/* Transfer Object panel */
.transfer-panel {
  position: fixed; bottom: 60px; left: 8px;
  z-index: 50;
}
.transfer-toggle {
  background: linear-gradient(135deg, #ff9966, #ff5e62);
  border: 2px solid #ff7733;
  color: #fff; padding: 8px 16px;
  border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold;
}
.transfer-menu {
  display: none; position: absolute; bottom: 100%;
  left: 0; margin-bottom: 4px;
  background: #1a1a2e; border: 1px solid #444;
  border-radius: 6px; padding: 6px; min-width: 150px;
  flex-direction: column; gap: 4px;
}
.transfer-menu.show { display: flex; }

/* Status bar */
.status-bar {
  padding: 4px 12px; background: #0d0d1a;
  font-size: 11px; color: #666;
  display: flex; gap: 16px; border-top: 1px solid #222;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* Animation for new blocks */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.block-item.new-block { animation: slideIn 0.2s ease-out; }

/* Toast notification (bottom-left) */
.toast-container {
  position: fixed; bottom: 16px; left: 16px; z-index: 9999;
  display: flex; flex-direction: column-reverse; gap: 8px;
  pointer-events: none;
}
.toast-msg {
  background: #1a1a2e; color: #e0e0e0;
  padding: 8px 16px; border-radius: 6px;
  font-size: 13px; border: 1px solid #333;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  animation: toastIn 0.25s ease-out;
  pointer-events: auto;
  max-width: 360px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.toast-msg.toast-fade {
  animation: toastOut 0.4s ease-in forwards;
}
@keyframes toastOut {
  from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); }
}

/* Drag overlay for preview characters */
.drag-overlay {
  position: absolute; pointer-events: none; z-index: 100;
  border: 2px dashed #4fc3f7; border-radius: 2px;
  background: rgba(79,195,247,0.08);
  display: none;
}
.drag-overlay.active { display: block; }
.drag-overlay.ready { pointer-events: auto; }

/* hover feedback on preview chars */
.char-highlight-hover  { background: rgba(129,212,250,0.20) !important; }
.char-highlight-drag   { background: rgba(79,195,247,0.35) !important; }

/* Disabled button */
.btn:disabled {
  opacity: 0.35; cursor: default; pointer-events: none;
}

/* Playing indicator */
.playing-indicator {
  position: absolute; top: 8px; right: 8px;
  background: #f44336; color: #fff;
  padding: 3px 10px; border-radius: 12px;
  font-size: 11px; animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <h1>📝 打字机事件编辑器</h1>
  <button class="btn btn-primary" onclick="createTypewriterBlock()">+ 创建打字机</button>
  <button class="btn" onclick="createEventBlock()">+ 创建普通事件</button>
  <button class="btn btn-primary" id="btnPlayGroup" onclick="playEventGroup()" title="播放事件组 (Space跳过)">▶ 播放事件组</button>
  <button class="btn" id="btnUndo" onclick="doUndo()" title="撤销 (Ctrl+Z)">↩ 撤销</button>
  <button class="btn" id="btnRedo" onclick="doRedo()" title="重做 (Ctrl+Y)">↪ 重做</button>
  <div style="flex:1"></div>
  <button class="btn" onclick="exportBlackMagic()">输出黑魔法</button>
  <button class="btn" onclick="showImportModal(false)">导入黑魔法</button>
  <button class="btn btn-danger" onclick="showImportModal(true)">覆盖导入</button>
  <button class="btn" onclick="refreshList()">刷新列表</button>
</div>

<!-- Main Area -->
<div class="main-area">
  <!-- Left: Preview Canvas -->
  <div class="preview-panel">
    <div class="preview-header" style="display:flex;align-items:center;gap:8px;padding:6px 12px;background:#16213e;border-bottom:1px solid #333;font-size:12px;flex-wrap:wrap">
      <span style="margin-left:0">相机X:</span>
      <input type="number" id="camX" value="16" onchange="onCamChange()" style="width:54px;padding:3px 6px;border-radius:3px;border:1px solid #444;background:#0a0a1a;color:#fff;font-size:12px">
      <span>相机Y:</span>
      <input type="number" id="camY" value="9" onchange="onCamChange()" style="width:54px;padding:3px 6px;border-radius:3px;border:1px solid #444;background:#0a0a1a;color:#fff;font-size:12px">
      <button class="btn btn-sm" id="btnClearPreview" onclick="clearPreview(true);renderAvailablePreview();" title="清除所有预览字符和转移物件" style="margin-left:8px">🧹 清除预览</button>
      <div style="width:1px;height:20px;background:#333;margin:0 4px"></div>
      <button class="btn btn-toggle active" id="btnToggleGrid" onclick="toggleGridBtn()">显示网格</button>
      <button class="btn btn-toggle" id="btnToggleCoords" onclick="toggleCoordsBtn()">显示行列标识</button>
      <button class="btn btn-toggle active" id="btnToggleBack" onclick="toggleLayerBack()">后景</button>
      <button class="btn btn-toggle active" id="btnToggleMid" onclick="toggleLayerMid()">中景</button>
      <button class="btn btn-toggle active" id="btnToggleFront" onclick="toggleLayerFront()">前景</button>
    </div>
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="previewCanvas" width="960" height="540"></canvas>
      <div class="drag-overlay" id="dragOverlay"></div>
      <div class="coord-overlay" id="coordOverlayH"></div>
      <div class="coord-overlay-v" id="coordOverlayV"></div>
    </div>
    <div style="padding:6px 12px;background:#16213e;display:flex;gap:6px;border-top:1px solid #333;font-size:12px;justify-content:flex-end">
      <input class="remark-input" id="newBlockRemark" placeholder="填写打字机备注">
      <button class="btn btn-primary" onclick="createTypewriterBlock()">创建打字</button>
      <button class="btn" onclick="createEventBlock()">创建普通事件</button>
    </div>
  </div>

  <!-- Center: Block List -->
  <div class="block-panel">
    <div class="panel-toolbar">
      <button class="btn btn-danger" onclick="deleteSelected()">删除选中</button>
      <input class="remark-input" id="changeRemarkInput" placeholder="更改选中打字机备注">
      <button class="btn btn-sm" onclick="changeSelectedRemark()">改备注</button>
      <button class="btn btn-sm" onclick="copyBlocks()">复制选中</button>
      <button class="btn btn-sm" onclick="cutBlocks()">剪切选中</button>
      <button class="btn btn-sm" onclick="pasteBlocks()">粘贴</button>
      <button class="btn btn-sm" onclick="duplicateBlocks()">复制并粘贴</button>
      <button class="btn btn-sm" style="margin-left:auto" onclick="exportBlackMagic()">输出黑魔法</button>
    </div>
    <div class="block-scroll" id="blockScroll">
      <div class="block-list" id="blockList"></div>
    </div>
  </div>

  <!-- Right: Styles Sidebar -->
  <div class="style-sidebar">
    <div class="style-header">样式库</div>
    <div style="padding:4px">
      <button class="btn btn-sm" style="width:100%" onclick="showStyleModal('create')">+ 创建样式</button>
    </div>
    <div class="style-list" id="styleList"></div>
  </div>
</div>

<!-- Transfer Objects Toggle -->
<div class="transfer-panel">
  <button class="transfer-toggle" id="transferToggle" onclick="toggleTransferMenu()">转移物件 ▼</button>
  <div class="transfer-menu" id="transferMenu">
    <button class="btn btn-sm" style="width:100%" onclick="showTransferModal('create')">创建转移物件</button>
    <button class="btn btn-sm" style="width:100%" onclick="showTransferModal('delete')">删除转移物件</button>
    <div id="transferObjectList" style="max-height:200px;overflow-y:auto;margin-top:4px"></div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay hidden" id="importModal">
  <div class="modal-box">
    <div class="modal-head">
      导入黑魔法
      <button class="modal-close" onclick="hideImportModal()">&times;</button>
    </div>
    <div class="modal-body">
      <textarea class="modal-textarea" id="importText" placeholder="在此粘贴黑魔法代码...&#10;&#10;格式示例:&#10;# 备注名&#10;@[type] {&quot;texts&quot;:&quot;你好&quot;,&quot;pos&quot;:[0,0]}"></textarea>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="hideImportModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmImport()">确认导入</button>
    </div>
  </div>
</div>

<!-- Style Create/Edit Modal -->
<div class="modal-overlay hidden" id="styleModal">
  <div class="modal-box" style="width:650px;">
    <div class="modal-head">
      <span id="styleModalTitle">创建样式</span>
      <button class="modal-close" onclick="hideStyleModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="style-form-row">
        <label>样式名称:</label>
        <input type="text" id="styleNameInput" placeholder="不可重名" style="flex:1">
      </div>
      <div class="style-label" style="font-size:12px;color:#888;margin-bottom:6px">
        效果是全局共享的，导出后自动加入label_settings
      </div>
      <div class="section-label">效果类型:</div>
      <div class="style-effect-tabs">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.6/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.27/dist/interact.min.js"></script>
<script>
// ==================== DATA MODEL ====================

const SFX_TABLE = [null,'none','princess','dragon','snake','poet','giant_l','giant_r'];
const SFX_CN = ['默认','无','公主','龙','蛇','诗人','左巨人','右巨人'];
const LAYER_TABLE = ['front','mid','back'];
const LAYER_CN = ['前景层','主要层','背景层'];

const DEFAULT_TYPE_EVENT = {
  type: "打字机", texts: "你好，世界！",
  posX: 0, posY: 0, tags: "", fixed: false,
  char_type: 0, has_animation: true, layer: 1,
  can_skip: true, need_accept: true, wait: true,
  is_dialog_end: false, is_on_top_of_player: false,
  offsetX: 0, offsetY: 0, id: null, remark: "", refTexts: []
};

const DEFAULT_EVENT = { type: "普通事件", texts: "", id: null };

// Global state
let blockList = [];           // Array of event objects
let eventIdList = [];         // Array of ids (parallel to blockList)
let eventObjIndexMap = {};    // id -> index in blockList
let selectedIds = [];         // Selected block IDs as strings
let expandedId = null;       // Currently expanded block ID
let expandedType = null;     // "打字机" or "普通事件"

// Undo/Redo
let undoStack = [];
let redoStack = [];
let idOccupiedList = [];
let tempIdOccupiedList = [];

// Clipboard
let clipboard = [];

// Styles: name -> value (color string, sound index int, or tag string)
let styles = {};
let styleYPos = 0;

// Transfer objects (模板/定义): name -> { text, color }
let transferObjects = {};

// 转移物件实例表（运行时——每个名字至多一个实例）
// name -> { pos: {x,y}, literal, color, tags }
// 同一名字多次出现时原地覆盖位置，产生"漂移"效果
let transferObjectInstances = {};

// Camera offset
let camOffsetX = 0;
let camOffsetY = 0;

// === 字符实体系统 ===
// 每个实体是游戏运行时的第一公民，打字机是实体的生成器
// 清除操作按 tags 清除实体，而不是按打字机清除
let _entityIdCounter = 0;
// 渲染层：存储字符实体对象 { id, literal, color, tags, x, y, showBg, fixed }
let bgLayer = [], midLayer = [], fgLayer = [];

// Animation state
let isPlaying = false;
let playingId = "";
let playAnimTimer = null;
let currentTween = null;

// Refresh lock
let refreshing = false;

// Canvas & rendering
const canvas = document.getElementById('previewCanvas');
const ctx = canvas.getContext('2d');

// Grid state
let showGridLayer1 = true; // layer 1 = grid lines (图块)
let showCoords = false;

// Layer visibility (前景/中景/后景)
let showLayerFront = true, showLayerMid = true, showLayerBack = true;

// Drag state for preview characters
let hoveredBlockId = null;   // block ID currently hovered
let draggedBlockId = null;   // block ID being dragged
let dragStartBlockPos = null; // original posX/posY of dragged block
let dragStartMouse = null;    // mouse position at drag start
let isDraggingPreview = false;

// SortableJS instance
let sortableInstance = null;

// ==================== UTILITIES ====================

function genId() {
  let id = Math.floor(Math.random() * 1000000);
  while (eventIdList.includes(id) || idOccupiedList.includes(id) || tempIdOccupiedList.includes(id)) {
    id = Math.floor(Math.random() * 1000000);
  }
  return id;
}

function hexToRgb(hex) {
  if (!hex || typeof hex !== 'string') return { r: 255, g: 255, b: 255, a: 1 };
  // Support 6-digit (#FFFFFF) and 8-digit (#FFFFFFcc) hex; ignore alpha
  let m = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})/i);
  if (!m) return { r: 255, g: 255, b: 255, a: 1 };
  return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16), a: 1 };
}

function parseBrackets(pairChar, str) {
  const openCh = pairChar[0], closeCh = pairChar[1];
  let stack = [], openCount = 0, results = [];
  for (let i = 0; i < str.length; i++) {
    const ch = str[i];
    if (ch === openCh) {
      if (stack.length === 0) stack.push(i);
      else { stack.push(ch); openCount++; }
    } else if (stack.length === 0) continue;
    else if (ch === closeCh) {
      if (openCount !== 0) { stack.push(ch); openCount--; continue; }
      results.push([]);
      results[results.length - 1].push(stack.shift());
      results[results.length - 1].push(stack.join(''));
      stack = [];
    } else stack.push(ch);
  }
  return results;
}

// === 简单 JSON 提取：深度计数 + 字符串感知，不重复造轮子 ===
function extractJSON(text) {
  let start = -1, depth = 0;
  let inString = false, escape = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (escape) { escape = false; continue; }
    if (ch === '\\') { escape = true; continue; }
    if (ch === '"') { inString = !inString; continue; }
    if (inString) continue;
    if (ch === '{') { if (start === -1) start = i; depth++; }
    else if (ch === '}') { depth--; if (depth === 0 && start !== -1) return text.substring(start, i + 1); }
  }
  return '';
}

function gridToPixel(vx, vy) {
  return { x: vx * 30, y: vy * 30 };
}

// ==================== UNDO SYSTEM ====================

function saveUndo(command, val, cont = false) {
  redoStack = [];
  tempIdOccupiedList = [];
  undoStack.push({ command, var: val, continue: cont });
  if (command === 'delete') {
    for (const item of val) idOccupiedList.push(item[0].id);
  }
  if (undoStack.length > 250) {
    const removed = undoStack.shift();
    if (removed.command === 'delete') {
      for (const item of removed.var) {
        const idx = idOccupiedList.indexOf(item[0].id);
        if (idx >= 0) idOccupiedList.splice(idx, 1);
      }
    }
  }
  updateUndoRedoBtns();
}

function doUndo() {
  stopAnimation();
  if (undoStack.length === 0) return;
  const action = undoStack.pop();
  const cmd = action.command;
  const val = action.var;
  
  // ── Save inverse action to redo BEFORE performing undo ──
  if (cmd === 'modifyParam') {
    const currentVal = val[0][val[1]];
    saveRedo('modifyParam', [val[0], val[1], currentVal]);
  } else if (cmd === 'delete') {
    // delete undo restores blocks → redo deletes them again
    saveRedo('delete', val);
  } else if (cmd === 'create') {
    // create undo removes blocks → redo recreates them
    const ids = Array.isArray(val) ? val : [val];
    const redoData = [];
    for (const id of ids) {
      const idx = eventObjIndexMap[String(id)];
      if (idx !== undefined) redoData.push({ idx, block: JSON.parse(JSON.stringify(blockList[idx])) });
    }
    saveRedo('create', redoData.length === 1 ? redoData[0] : redoData);
  } else if (cmd === 'moveBlock') {
    saveRedo('moveBlock', [JSON.parse(JSON.stringify(blockList)), [...eventIdList]]);
  } else if (cmd === 'modifyRemark') {
    const redoData = [];
    for (const item of val) redoData.push([blockList[item[1]].remark, item[1]]);
    saveRedo('modifyRemark', redoData);
  }
  
  // ── Perform undo ──
  if (cmd === 'modifyParam') {
    val[0][val[1]] = val[2];
    renderBlockList();
  } else if (cmd === 'delete') {
    let i = val.length - 1;
    while (i >= 0) {
      const item = val[i];
      blockList.splice(item[1], 0, item[0]);
      eventIdList.splice(item[1], 0, item[0].id);
      const idx = idOccupiedList.indexOf(item[0].id);
      if (idx >= 0) idOccupiedList.splice(idx, 1);
      i--;
    }
    renderBlockList(true);
  } else if (cmd === 'create') {
    for (const id of Array.isArray(val) ? val : [val]) {
      const idx = eventObjIndexMap[String(id)];
      if (idx === undefined) continue;
      delete eventObjIndexMap[String(id)];
      blockList.splice(idx, 1);
      eventIdList.splice(idx, 1);
    }
    renderBlockList(true);
  } else if (cmd === 'moveBlock') {
    // Restore from snapshot
    blockList = JSON.parse(JSON.stringify(val[0]));
    eventIdList = [...val[1]];
    renderBlockList(true);
  } else if (cmd === 'modifyRemark') {
    for (const item of val) {
      blockList[item[1]].remark = item[0];
    }
    renderBlockList(true);
  }

  // Toast + button state
  const undoMsgs = { modifyParam:'修改参数', delete:'删除积木', create:'创建积木', moveBlock:'移动积木', modifyRemark:'修改备注' };
  showToast('↩ 撤销：' + (undoMsgs[cmd] || cmd));
  updateUndoRedoBtns();
}

function doRedo() {
  stopAnimation();
  if (redoStack.length === 0) return;
  const action = redoStack.pop();
  const cmd = action.command;
  const val = action.var;
  
  // ── Save inverse action to undo BEFORE performing redo ──
  // Push directly to avoid saveUndo clearing redoStack
  if (cmd === 'modifyParam') {
    const currentVal = val[0][val[1]];
    undoStack.push({ command: 'modifyParam', var: [val[0], val[1], currentVal], continue: false });
  } else if (cmd === 'delete') {
    undoStack.push({ command: 'delete', var: val, continue: false });
  } else if (cmd === 'create') {
    const items = Array.isArray(val) ? val : [val];
    const ids = [];
    for (const item of items) { ids.push((item.block || item).id); }
    undoStack.push({ command: 'create', var: ids.length === 1 ? ids[0] : ids, continue: false });
  } else if (cmd === 'moveBlock') {
    undoStack.push({ command: 'moveBlock', var: [JSON.parse(JSON.stringify(blockList)), [...eventIdList]], continue: false });
  } else if (cmd === 'modifyRemark') {
    const undoData = [];
    for (const item of val) undoData.push([blockList[item[1]].remark, item[1]]);
    undoStack.push({ command: 'modifyRemark', var: undoData, continue: false });
  }
  if (undoStack.length > 250) undoStack.shift();
  
  // ── Perform redo ──
  if (cmd === 'modifyParam') {
    val[0][val[1]] = val[2];
    renderBlockList();
  } else if (cmd === 'delete') {
    let i = val.length - 1;
    while (i >= 0) {
      const item = val[i];
      const idx = eventObjIndexMap[String(item[0].id)];
      if (idx === undefined) { i--; continue; }
      blockList.splice(idx, 1);
      eventIdList.splice(idx, 1);
      if (!idOccupiedList.includes(item[0].id)) idOccupiedList.push(item[0].id);
      i--;
    }
    renderBlockList(true);
  } else if (cmd === 'create') {
    const items = Array.isArray(val) ? val : [val];
    for (const item of items) {
      const block = item.block || item;
      const idx = (item.idx !== undefined) ? item.idx : blockList.length;
      blockList.splice(idx, 0, block);
      eventIdList.splice(idx, 0, block.id);
      rebuildIndexMap();
    }
    renderBlockList(true);
  } else if (cmd === 'moveBlock') {
    blockList = JSON.parse(JSON.stringify(val[0]));
    eventIdList = [...val[1]];
    renderBlockList(true);
  } else if (cmd === 'modifyRemark') {
    for (const item of val) {
      blockList[item[1]].remark = item[0];
    }
    renderBlockList(true);
  }

  // Toast + button state
  const redoMsgs = { modifyParam:'修改参数', delete:'删除积木', create:'创建积木', moveBlock:'移动积木', modifyRemark:'修改备注' };
  showToast('↪ 重做：' + (redoMsgs[cmd] || cmd));
  updateUndoRedoBtns();
}

function saveRedo(command, val, cont = false) {
  redoStack.push({ command: command, var: val, continue: cont });
  if (redoStack.length > 250) redoStack.shift();
  updateUndoRedoBtns();
}

function updateUndoRedoBtns() {
  document.getElementById('btnUndo').disabled = (undoStack.length === 0);
  document.getElementById('btnRedo').disabled = (redoStack.length === 0);
}

function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.classList.add('toast-fade'); }, 2000);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 2500);
}

// ==================== BLOCK LIST MANAGEMENT ====================

function createTypewriterBlock() {
  const block = JSON.parse(JSON.stringify(DEFAULT_TYPE_EVENT));
  const id = genId();
  block.id = id;
  const remark = document.getElementById('newBlockRemark').value || '';
  block.remark = remark;
  document.getElementById('newBlockRemark').value = '';
  
  blockList.push(block);
  eventIdList.push(id);
  saveUndo('create', id, false);
  rebuildIndexMap();
  renderBlockList(true);
  clearPreview();
  updateStatus();
}

function showEventTemplateModal() {
  document.getElementById('eventTemplateModal').classList.remove('hidden');
}

function hideEventTemplateModal() {
  document.getElementById('eventTemplateModal').classList.add('hidden');
}

function selectEventTemplate(template) {
  hideEventTemplateModal();
  
  const block = JSON.parse(JSON.stringify(DEFAULT_EVENT));
  const id = genId();
  block.id = id;
  
  // 根据模板设置 texts
  switch(template) {
    case 'wait':
      block.texts = '@[wait] 60';
      break;
    case 'wait_random':
      block.texts = '@[wait_random_in_range] {"value": [30,60]}';
      break;
    case 'break':
      block.texts = '@[break]';
      break;
    case 'clear_typed':
      block.texts = '@[clear_typed] ""';
      break;
    case 'empty':
      block.texts = '';
      break;
  }
  
  blockList.push(block);
  eventIdList.push(id);
  saveUndo('create', id, false);
  rebuildIndexMap();
  renderBlockList(true);
  updateStatus();
  
  // 自动展开新创建的积木
  if (template === 'empty') {
    toggleBlock(String(id));
  }
}

function createEventBlock() {
  showEventTemplateModal();
}

function renderBlockList(fullRebuild = false) {
  refreshing = true;
  const container = document.getElementById('blockList');
  
  if (fullRebuild) {
    eventObjIndexMap = {};
    clearSelection();
    container.innerHTML = '';
  }
  
  if (blockList.length === 0) {
    if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
    container.innerHTML = '<div style="color:#555;padding:40px;text-align:center;">暂无事件积木<br><br>点击上方按钮创建打字机或普通事件</div>';
    refreshing = false;
    updateStatus();
    return;
  }
  
  let html = '';
  for (let i = 0; i < blockList.length; i++) {
    const ev = blockList[i];
    const idStr = String(ev.id);
    
    if (fullRebuild && !eventObjIndexMap.hasOwnProperty(idStr)) {
      eventObjIndexMap[idStr] = i;
    }
    
    const idx = eventObjIndexMap[idStr];
    if (idx === undefined) continue;
    
    const isExpanded = expandedId === idStr;
    
    const isSelected = selectedIds.includes(idStr);
    const selClass = isSelected ? 'selected highlighted' : '';
    const expClass = isExpanded ? 'expanded' : '';
    
    if (ev.type === '打字机') {
      html += buildTypewriterBlockHTML(ev, idStr, idx, isExpanded, selClass, expClass);
    } else {
      html += buildEventBlockHTML(ev, idStr, idx, isExpanded, selClass, expClass);
    }
  }
  
  container.innerHTML = html;
  
  // Initialize SortableJS after DOM rebuild
  initSortable();
  
  refreshing = false;
  updateStatus();
  bindBlockEvents();
  
  // Re-render preview if something is selected or expanded
  renderAvailablePreview();
}

function buildTypewriterBlockHTML(ev, idStr, idx, isExpanded, selClass, expClass) {
  const remark = ev.remark ? `打字机 ${ev.remark}` : '打字机';
  const sfxIdx = typeof ev.char_type === 'number' ? ev.char_type : SFX_TABLE.indexOf(ev.char_type);
  const layerIdx = typeof ev.layer === 'number' ? ev.layer : LAYER_TABLE.indexOf(ev.layer);
  
  return `<div class="block-item ${selClass} ${expClass}" data-id="${idStr}" data-idx="${idx}" >
  <div class="block-header" onclick="onBlockHeaderClick(event,'${idStr}','打字机')" onmouseenter="onBlockHover('${idStr}',true)" onmouseleave="onBlockHover('${idStr}',false)">
    <div class="drag-handle"><div class="drag-handle-inner"></div></div>
    <span class="block-title">${escapeHtml(remark)}</span>
    <span class="expand-arrow">${isExpanded?'▲':'▼'}</span>
  </div>
  <div class="block-content">
    <div class="tw-fields">
      <div class="text-edit-area">
        <textarea id="txt_${idStr}" oninput="onTextChanged('${idStr}')" placeholder="输入打字机文字... 支持&lt;样式&gt;标签和[转移物件]语法">${escapeHtml(ev.texts)}</textarea>
        <div class="symbol-btns">
          ${[
            '，','。','︰','…','、','；','！','？','～','—','·','※',
            '▲','▼','★','☆','◆','◇','→','←','↑','↓',
            '＿','|','&',
            '《》','（）','「」','｛｝','【】','〖〗','\u201c\u201d','\u2018\u2019','〈〉'
          ].map(s=>`<button class="sym-btn${s.length===2?' pair':''}${['|','&','＿'].includes(s)?' sym-functional':''}" onclick="insertSymbol('${idStr}','${escapeHtml(s)}')">${escapeHtml(s)}</button>`).join('')}
        </div>
      </div>
      <div class="params-area">
        <div class="fields-grid">

function buildEventBlockHTML(ev, idStr, idx, isExpanded, selClass, expClass) {
  let label = '事件';
  const txt = ev.texts || '';
  if (txt.startsWith('@[wait]')) label = '延迟固定时间';
  else if (txt.startsWith('@[wait_random_in_range]')) label = '延迟随机时间';
  else if (txt.startsWith('@[clear_typed]')) label = '清除打字机';
  else if (txt.startsWith('@[')) {
    const f = txt.indexOf(']');
    label = f >= 0 ? txt.substring(0, f + 1) : '事件';
  }
  
  return `<div class="block-item ${selClass} ${expClass}" data-id="${idStr}" data-idx="${idx}" >
  <div class="block-header" onclick="onBlockHeaderClick(event,'${idStr}','普通事件')" onmouseenter="onBlockHover('${idStr}',true)" onmouseleave="onBlockHover('${idStr}',false)">
    <div class="drag-handle"><div class="drag-handle-inner"></div></div>
    <span class="block-title">${escapeHtml(label)}</span>
    <span class="expand-arrow">${isExpanded?'▲':'▼'}</span>
  </div>
  <div class="block-content">
    <textarea class="event-textarea" id="etxt_${idStr}" oninput="onEventTextChanged('${idStr}')" placeholder="@[command] 或普通指令...">${escapeHtml(txt)}</textarea>
  </div>
</div>`;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function bindBlockEvents() {
  // Events are bound via inline handlers in HTML
}

// ==================== BLOCK INTERACTIONS ====================

function onBlockHeaderClick(e, idStr, type) {
  e.stopPropagation();
  
  // Ctrl+click = multi-select
  if (e.ctrlKey) {
    toggleSelection(idStr);
    return;
  }
  // Shift+click = range select
  if (e.shiftKey) {
    rangeSelect(idStr);
    return;
  }
  
  // Normal click = expand/collapse
  if (playGroupState.active) return;
  if (expandedId === idStr) {
    collapseBlock(idStr);
  } else {
    expandBlock(idStr, type);
  }
}

function onBlockHover(idStr, entering) {
  const el = document.querySelector(`.block-item[data-id="${idStr}"]`);
  if (!el) return;
  if (selectedIds.includes(idStr)) return; // 选中状态不覆盖
  if (entering) {
    el.classList.add('highlighted');
  } else {
    el.classList.remove('highlighted');
  }
}

function updateBlockListHeight() {
  const container = document.getElementById('blockList');
  let y = 0;
  for (let i = 0; i < blockList.length; i++) {
    const eid = String(blockList[i].id);
    const ev = blockList[i];
    const isExp = expandedId === eid;
    y += (isExp ? 56 + getExpandOffset(ev.type) + 0 : 56 + 0);
  }
  container.style.height = y + 'px';
}

function expandBlock(idStr, type) {
  clearSelection();
  
  // Only one expanded at a time
  if (expandedId && expandedId !== idStr) {
    const prevBlockEl = document.querySelector(`.block-item[data-id="${expandedId}"]`);
    if (prevBlockEl) prevBlockEl.classList.remove('expanded');
  }
  
  expandedId = idStr;
  expandedType = type;
  
  const blockEl = document.querySelector(`.block-item[data-id="${idStr}"]`);
  if (blockEl) blockEl.classList.add('expanded');
  
  // Clear preview then render expanded block
  clearPreview(true);
  renderPreviewForId(idStr);
}

function collapseBlock(idStr) {
  expandedId = null;
  expandedType = null;

  const blockEl = document.querySelector(`.block-item[data-id="${idStr}"]`);
  if (blockEl) blockEl.classList.remove('expanded');

  clearPreview(true);
  renderAvailablePreview();
}

function collapseAllExcept(exceptId) {
  document.querySelectorAll('.block-item.expanded').forEach(el => {
    const id = el.dataset.id;
    if (id !== exceptId) el.classList.remove('expanded');
  });
}

// No longer needed with flow layout — keep for backward compat
function updateBlockListHeight() {}

// ==================== SELECTION ====================

function toggleSelection(idStr) {
  const idx = selectedIds.indexOf(idStr);
  if (idx >= 0) selectedIds.splice(idx, 1);
  else selectedIds.unshift(idStr);
  highlightSelection();
}

function rangeSelect(idStr) {
  if (selectedIds.length === 0) {
    selectedIds.push(idStr);
  } else if (selectedIds.length === 1) {
    const firstIdx = eventObjIndexMap[selectedIds[0]];
    const thisIdx = eventObjIndexMap[idStr];
    const start = Math.min(firstIdx, thisIdx);
    const end = Math.max(firstIdx, thisIdx);
    selectedIds = [];
    for (let i = start; i <= end; i++) {
      selectedIds.push(String(eventIdList[i]));
    }
  } else {
    const firstIdx = eventObjIndexMap[selectedIds[0]];
    selectedIds = [selectedIds[0], idStr];
    const thisIdx = eventObjIndexMap[idStr];
    const start = Math.min(firstIdx, thisIdx);
    const end = Math.max(firstIdx, thisIdx);
    for (let i = start + 1; i < end; i++) {
      selectedIds.push(String(eventIdList[i]));
    }
  }
  highlightSelection();
}

function highlightSelection() {
  // Clear all preview data once before re-rendering
  clearPreview(false, '___PREVIEW___', true, true);
  document.querySelectorAll('.block-item').forEach(el => {
    const id = el.dataset.id;
    if (selectedIds.includes(id)) {
      el.classList.add('selected', 'highlighted');
    } else {
      el.classList.remove('selected', 'highlighted');
      el.style.filter = '';
    }
  });
  // Render preview for each selected (renderPreviewAdditive does NOT clear)
  for (const id of selectedIds) renderPreviewForId(id);
  updateStatus();
}

function clearSelection() {
  selectedIds = [];
  document.querySelectorAll('.block-item').forEach(el => {
    el.classList.remove('selected', 'highlighted');
    el.style.filter = '';
  });
}

function selectAll() {
  let count = 0;
  for (const id in eventObjIndexMap) {
    if (selectedIds.includes(id)) { count++; continue; }
    selectedIds.push(id);
  }
  if (count === Object.keys(eventObjIndexMap).length) selectedIds = [];
  highlightSelection();
}

function invertSelection() {
  const newSel = [];
  for (const id in eventObjIndexMap) {
    if (!selectedIds.includes(id)) newSel.push(id);
  }
  selectedIds = newSel;
  highlightSelection();
}

// ==================== PARAM CHANGES ====================

function onTextChanged(idStr) {
  if (refreshing) return;
  const ta = document.getElementById(`txt_${idStr}`);
  if (!ta) return;
  const idx = eventObjIndexMap[idStr];
  if (idx === undefined) return;
  const oldVal = blockList[idx].texts;
  saveUndo('modifyParam', [blockList[idx], 'texts', oldVal], false);
  blockList[idx].texts = ta.value;
  clearPreview(true);
  renderPreviewForId(idStr);
}

function onEventTextChanged(idStr) {
  if (refreshing) return;
  const ta = document.getElementById(`etxt_${idStr}`);
  if (!ta) return;
  const idx = eventObjIndexMap[idStr];
  if (idx === undefined) return;
  const oldVal = blockList[idx].texts;
  saveUndo('modifyParam', [blockList[idx], 'texts', oldVal], false);
  blockList[idx].texts = ta.value;
  // Update label
  let label = '事件';
  const txt = ta.value;
  if (txt.startsWith('@[wait]')) label = '延迟固定时间';
  else if (txt.startsWith('@[wait_random_in_range]')) label = '延迟随机时间';
  else if (txt.startsWith('@[clear_typed]')) label = '清除打字机';
  else if (txt.startsWith('@[')) {
    const f = txt.indexOf(']');
    label = f >= 0 ? txt.substring(0, f + 1) : '事件';
  }
  const titleEl = document.querySelector(`.block-item[data-id="${idStr}"] .block-title`);
  if (titleEl) titleEl.textContent = label;
}

function onParamChange(idStr, param, newVal) {
  if (refreshing) return;
  const idx = eventObjIndexMap[idStr];
  if (idx === undefined) return;
  const parsedVal = ['posX','posY','offsetX','offsetY'].includes(param) ? parseInt(newVal) || 0 : newVal;
  const oldVal = blockList[idx][param];
  saveUndo('modifyParam', [blockList[idx], param, oldVal], false);
  blockList[idx][param] = parsedVal;
  clearPreview(true);
  renderPreviewForId(idStr);
}

function selectSfx(idStr, sfxIdx, btnEl) {
  const parent = btnEl.parentElement;
  parent.querySelectorAll('.sl-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  onParamChange(idStr, 'char_type', sfxIdx);
}

function selectLayer(idStr, layerIdx, btnEl) {
  const parent = btnEl.parentElement;
  parent.querySelectorAll('.sl-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  onParamChange(idStr, 'layer', layerIdx);
}

function toggleBool(idStr, param, btnEl) {
  const idx = eventObjIndexMap[idStr];
  if (idx === undefined) return;
  const newVal = !blockList[idx][param];
  saveUndo('modifyParam', [blockList[idx], param, !newVal], false);
  blockList[idx][param] = newVal;
  btnEl.classList.toggle('active', newVal);
}

// === 符号表插入（配对符号自动括选） ===
function insertSymbol(idStr, sym) {
  const ta = document.getElementById('txt_' + idStr);
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const text = ta.value;
  const sel = text.substring(start, end);
  const before = text.substring(0, start), after = text.substring(end);

  // 配对符号（2 字符）：选中时括住内容，无选中时插入空对
  if (sym.length === 2) {
    const L = sym[0], R = sym[1];
    ta.value = before + L + sel + (sel ? R : '') + (sel ? '' : R) + after;
    ta.focus();
    ta.selectionStart = ta.selectionEnd = sel ? start + L.length : start + 1;
  } else {
    // 单字符符号：插入到光标位置
    ta.value = before + sym + sel + after;
    ta.focus();
    ta.selectionStart = ta.selectionEnd = start + sym.length;
  }
  onTextChanged(idStr);
}

// ==================== DRAG REORDERING (SortableJS) ====================

function rebuildIndexMap() {
  eventObjIndexMap = {};
  for (let i = 0; i < blockList.length; i++) {
    eventObjIndexMap[String(blockList[i].id)] = i;
  }
}

function initSortable() {
  const listEl = document.getElementById('blockList');
  if (!listEl) return;
  
  // Destroy previous instance
  if (sortableInstance) sortableInstance.destroy();
  
  sortableInstance = new Sortable(listEl, {
    handle: '.drag-handle',
    animation: 150,
    easing: 'cubic-bezier(0.2, 0, 0, 1)',
    ghostClass: 'sortable-ghost',
    dragClass: 'sortable-drag',
    forceFallback: true,
    fallbackClass: 'sortable-fallback',
    
    onStart: function(evt) {
      document.body.style.userSelect = 'none';
      // Save undo snapshot
      window._dragSnapshot = [
        JSON.parse(JSON.stringify(blockList)),
        [...eventIdList]
      ];
    },
    
    onEnd: function(evt) {
      document.body.style.userSelect = '';
      
      const oldIdx = evt.oldIndex;
      const newIdx = evt.newIndex;
      
      if (oldIdx === newIdx) return;
      
      // Sync data arrays with DOM order
      const movedBlock = blockList[oldIdx];
      const movedId = eventIdList[oldIdx];
      
      blockList.splice(oldIdx, 1);
      eventIdList.splice(oldIdx, 1);
      blockList.splice(newIdx, 0, movedBlock);
      eventIdList.splice(newIdx, 0, movedId);
      
      rebuildIndexMap();
      updateDataIdxAttrs();
      
      // Save undo
      if (window._dragSnapshot) {
        saveUndo('moveBlock', window._dragSnapshot, false);
        window._dragSnapshot = null;
      }
    }
  });
}

function updateDataIdxAttrs() {
  document.querySelectorAll('#blockList .block-item').forEach((el, i) => {
    el.dataset.idx = i;
  });
}

// ==================== DELETE / COPY / PASTE ====================

function deleteSelected() {
  if (selectedIds.length === 0) return;
  stopAnimation();
  
  const indices = selectedIds.map(id => eventObjIndexMap[id]).filter(x => x !== undefined).sort((a,b)=>b-a);
  if (indices.length === 0) return;
  
  const undoData = [];
  for (const idx of indices) {
    undoData.push([JSON.parse(JSON.stringify(blockList[idx])), idx]);
    blockList.splice(idx, 1);
    eventIdList.splice(idx, 1);
  }
  
  saveUndo('delete', undoData, false);
  clearSelection();
  renderBlockList(true);
  clearPreview();
}

function copyBlocks() {
  clipboard = [];
  if (selectedIds.length === 0) return;
  for (let i = 0; i < blockList.length; i++) {
    if (selectedIds.includes(String(blockList[i].id))) {
      clipboard.push(JSON.parse(JSON.stringify(blockList[i])));
    }
  }
  clearSelection();
}

function cutBlocks() {
  copyBlocks();
  deleteSelected();
}

function pasteBlocks() {
  if (clipboard.length === 0) return;
  clearSelection();
  
  let pastePos = -1;
  if (selectedIds.length > 0) {
    pastePos = eventIdList.indexOf(parseInt(selectedIds[selectedIds.length - 1]));
  }
  
  const newIds = [];
  for (const data of clipboard) {
    const newData = JSON.parse(JSON.stringify(data));
    const newId = genId();
    newData.id = newId;
    if (pastePos === -1) {
      blockList.push(newData);
      eventIdList.push(newId);
    } else {
      pastePos++;
      blockList.splice(pastePos, 0, newData);
      eventIdList.splice(pastePos, 0, newId);
    }
    newIds.push(String(newId));
    saveUndo('create', newId, false);
  }
  
  renderBlockList(pastePos === -1 ? false : true);
  selectedIds = [...newIds];
  highlightSelection();
}

function duplicateBlocks() {
  if (selectedIds.length === 0) return;
  const newIds = [];
  for (const idStr of selectedIds) {
    const idx = eventObjIndexMap[idStr];
    if (idx === undefined) continue;
    const pastePos = idx + 1;
    const data = JSON.parse(JSON.stringify(blockList[idx]));
    const newId = genId();
    data.id = newId;
    blockList.splice(pastePos, 0, data);
    eventIdList.splice(pastePos, 0, newId);
    newIds.push(String(newId));
    saveUndo('create', newId, false);
  }
  renderBlockList(true);
  selectedIds = newIds;
  highlightSelection();
}

function changeSelectedRemark() {
  if (selectedIds.length === 0) return;
  const newVal = document.getElementById('changeRemarkInput').value;
  const undoData = [];
  for (const idStr of selectedIds) {
    const idx = eventObjIndexMap[idStr];
    if (idx === undefined || blockList[idx].type !== '打字机') continue;
    undoData.push([blockList[idx].remark, idx]);
    blockList[idx].remark = newVal;
  }
  saveUndo('modifyRemark', undoData, false);
  document.getElementById('changeRemarkInput').value = '';
  renderBlockList(true);
}

// ==================== CANVAS RENDERING ====================

function clearPreview(clearAll = false, tags = '', byId = false, invert = false) {
  // Reset drag/hover state
  draggedBlockId = null; hoveredBlockId = null;
  isDraggingPreview = false;
  dragStartMouse = null; dragStartBlockPos = null;
  const overlay = document.getElementById('dragOverlay');
  if (overlay) overlay.classList.remove('active', 'ready');

  if (clearAll) { bgLayer = []; midLayer = []; fgLayer = []; transferObjectInstances = {}; }
  else {
    removeLayerData(tags, byId, invert);
    if (tags) clearTransferObjectInstances(tags);
  }
  renderCanvas();
}

function removeLayerData(tags, byId, invert) {
  const remove = (arr) => {
    let i = arr.length - 1;
    while (i >= 0) {
      const match = byId ? (arr[i].tags === blockList[eventObjIndexMap[tags]]?.tags) : (arr[i].tags === tags);
      if (invert ? !match : match) arr.splice(i, 1);
      i--;
    }
  };
  remove(bgLayer); remove(midLayer); remove(fgLayer);
}

function callRender() {
  renderCanvas();
}

// 字符实体创建 —— 全局唯一入口
// x, y 为网格坐标（可非整数），渲染时 *30 转像素
// tags 为空格分隔的标签字符串
function createCharEntity(literal, gridX, gridY, layerNum, tags, showBg, fixed, colorHex, blockId) {
  const entity = {
    id: ++_entityIdCounter,
    literal: String(literal),
    color: hexToRgb(colorHex || '#FFFFFF'),
    tags: tags || '',
    x: gridX,
    y: gridY,
    showBg: showBg !== false,
    fixed: !!fixed,
    blockId: blockId || ''
  };
  if (layerNum === 0) fgLayer.push(entity);
  else if (layerNum === 1) midLayer.push(entity);
  else if (layerNum === 2) bgLayer.push(entity);
  return entity;
}

// 按标签精确清除字符实体
function clearEntitiesByTag(tag) {
  for (const layer of [bgLayer, midLayer, fgLayer]) {
    for (let i = layer.length - 1; i >= 0; i--) {
      if (layer[i].tags.split(' ').includes(tag)) {
        layer.splice(i, 1);
      }
    }
  }
}

function renderAvailablePreview() {
  // 播放事件组模式：不更新静态预览
  if (playGroupState.active) return;
  
  if (selectedIds.length > 0) {
    for (const id of selectedIds) renderPreviewForId(id);
  } else if (expandedId !== null) {
    renderPreviewForId(expandedId);
  } else {
    clearPreview(true);
  }
}

function renderPreviewForId(idStr) {
  stopAnimation();
  // NOTE: Clearing is now done once in highlightSelection, not here,
  // so multiple selected blocks can all render their preview.
  // When called from playTypewriterPreview, we still want a clear first:
  if (selectedIds.length === 0 && expandedId !== idStr) {
    clearPreview(false, '___PREVIEW___', true, true);
  }
  
  const idx = eventObjIndexMap[idStr];
  if (idx === undefined) return;
  const data = blockList[idx];
  if (data.type !== '打字机') return;
  
  let posX = parseInt(data.posX) || 0;
  let posY = parseInt(data.posY) || 0;
  let offsetX = parseInt(data.offsetX) || 0;
  let offsetY = parseInt(data.offsetY) || 0;
  const texts = data.texts || '';
  let tags = data.tags || '';
  if (!tags) tags = 'default';
  const fixed = !!data.fixed;
  const layer = typeof data.layer === 'number' ? data.layer : LAYER_TABLE.indexOf(data.layer);
  
  let posX2 = posX, posY2 = posY;
  const defaultColor = '#FFFFFF';
  let char = '', showBg = true;
  
  // Parse style tags <>
  const styleIndices = parseBrackets('<>', texts);
  const noRenderIdx = [];
  const styleColors = [];
  const colorStartPositions = [];
  
  for (const si of styleIndices) {
    const startPos = si[0], content = si[1];
    for (let k = startPos; k < startPos + content.length + 2; k++) noRenderIdx.push(k);
    if (content.startsWith('/')) {
      const sName = content.substring(1);
      if (sName && styles.hasOwnProperty(sName)) { styleColors.push([sName]); colorStartPositions.push(startPos); }
    } else if (styles.hasOwnProperty(content)) {
      const effect = styles[content];
      if (typeof effect === 'string' && /^#[0-9a-f]{6}$/i.test(effect)) styleColors.push(effect);
      else if (typeof effect === 'number') styleColors.push('#FFFFFF'); // sound
      else if (typeof effect === 'string') {} // tags
      colorStartPositions.push(startPos);
    }
  }
  
  // Parse [] brackets (transfer objects / special)
  const bracketIndices = parseBrackets('[]', texts);
  const specialRenderIdx = {};
  for (const bi of bracketIndices) {
    const startPos = bi[0], content = bi[1];
    for (let k = startPos; k < startPos + content.length + 2; k++) noRenderIdx.push(k);
    const objName = content.split('{')[0];
    specialRenderIdx[startPos] = transferObjects[objName] ? objName : '*';
  }
  
  // Parse {} brackets
  const braceIndices = parseBrackets('{}', texts);
  for (const bi of braceIndices) {
    const startPos = bi[0], content = bi[1];
    for (let k = startPos; k < startPos + content.length + 2; k++) noRenderIdx.push(k);
  }
  
  // Render each character
  let colorStack = [], colorI = 0;
  for (let i = 0; i < texts.length; i++) {
    showBg = true;
    let color = defaultColor;
    if (colorStack.length > 0) color = colorStack[colorStack.length - 1];
    
    if (colorStartPositions.includes(i)) {
      if (Array.isArray(styleColors[colorI])) {
        // End style - remove from stack
        const rmColor = styles[styleColors[colorI][0]];
        const stackIdx = colorStack.lastIndexOf(rmColor);
        if (stackIdx >= 0) colorStack.splice(stackIdx, 1);
        colorI++;
      } else {
        colorStack.push(styleColors[colorI]);
        colorI++;
      }
    }
    
    char = texts[i];
    if (char === '&' || char === '\n' || char === '\r') { posX2 = posX; posY2++; }
    else if (String(i) in specialRenderIdx) {
      const pixelPos = gridToPixel(posX2, posY2);
      pixelPos.x -= camOffsetX * 30; pixelPos.y -= camOffsetY * 30;
      if (specialRenderIdx[String(i)] === '*') {
        createCharEntity('*', posX2 - camOffsetX, posY2 - camOffsetY, layer, '___PREVIEW___', showBg, fixed, '#FFFFFF', idStr);
        posX2++;
      } else {
        updateTransferObjectInstance(specialRenderIdx[String(i)], { x: pixelPos.x + offsetX, y: pixelPos.y + offsetY }, '___PREVIEW___');
        posX2++;
      }
    } else if (noRenderIdx.includes(i)) {}
    else if (char === '|') {}
    else if (char === '＿') { posX2++; }
    else {
      createCharEntity(char, posX2 + offsetX/30, posY2 + offsetY/30, layer, '___PREVIEW___', showBg, fixed, color, idStr);
      posX2++;
    }
  }
  callRender();
}

// Full render function for the canvas
function renderCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw grid if enabled
  if (showGridLayer1) drawGrid();
  
  // 渲染顺序（后画的覆盖先画的）：
  // 后景字符 → 后景转移物件 → 中景字符 → 中景转移物件 → 前景字符 → 前景转移物件
  // 同层内转移物件在后，显示在字符上方
  if (showLayerBack) {
    renderLayer(bgLayer, 2);
    drawTransferObjectsByLayer(2);
  }
  if (showLayerMid) {
    renderLayer(midLayer, 1);
    drawTransferObjectsByLayer(1);
  }
  if (showLayerFront) {
    renderLayer(fgLayer, 0);
    drawTransferObjectsByLayer(0);
  }
  
  // Draw accept marker if active (rendered as char entity via createCharEntity)
  // No separate drawing needed - it's already in the layer
}

// ───── Preview character drag ─────

// Find the block ID of the preview character at canvas pixel (mx, my)
// Returns blockId string or null
function findBlockAtPixel(mx, my) {
  // Convert pixel to grid coords (accounting for camera offset)
  const ts = 30;
  const gx = (mx + camOffsetX * ts) / ts;
  const gy = (my + camOffsetY * ts) / ts;
  // Search all layers (fgLayer is drawn last, so search first for topmost)
  for (const layer of [fgLayer, midLayer, bgLayer]) {
    for (let i = layer.length - 1; i >= 0; i--) {
      const e = layer[i];
      if (!e.blockId) continue;
      // Check if pixel falls within this character's cell
      if (gx >= e.x - 0.4 && gx <= e.x + 0.6 && gy >= e.y - 0.4 && gy <= e.y + 0.6) {
        return e.blockId;
      }
    }
  }
  return null;
}

// Get bounding box of all characters for a given blockId (in grid coords)
function getBlockBounds(blockId) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const layer of [fgLayer, midLayer, bgLayer]) {
    for (const e of layer) {
      if (e.blockId !== blockId) continue;
      if (e.x < minX) minX = e.x;
      if (e.y < minY) minY = e.y;
      if (e.x > maxX) maxX = e.x;
      if (e.y > maxY) maxY = e.y;
    }
  }
  if (!isFinite(minX)) return null;
  return { minX, minY, maxX, maxY };
}

// Update drag overlay position based on current mouse
function updateDragOverlay(mx, my) {
  if (!dragStartBlockPos || !dragStartMouse || !draggedBlockId) return;
  // Safety: verify block still exists
  const idx = eventObjIndexMap[draggedBlockId];
  if (idx === undefined) return;
  const data = blockList[idx];
  const ts = 30;
  const dx = Math.round((mx - dragStartMouse.x) / ts);
  const dy = Math.round((my - dragStartMouse.y) / ts);
  const newPosX = dragStartBlockPos.x + dx;
  const newPosY = dragStartBlockPos.y + dy;

  // Get the block's character count for width
  const texts = data.texts || '';
  const lines = texts.split(/[&\n\r]/);
  const maxLen = Math.max(...lines.map(l => l.replace(/<[^>]*>/g,'').replace(/[|＿\{\}\[\]]/g,'').length), 0);
  const lineCount = lines.length;

  const overlay = document.getElementById('dragOverlay');
  const wrapper = document.getElementById('canvasWrapper');
  const wrapperRect = wrapper.getBoundingClientRect();
  const canvasRect = canvas.getBoundingClientRect();
  const offsetLeft = canvasRect.left - wrapperRect.left;
  const offsetTop = canvasRect.top - wrapperRect.top;
  const tsCanvas = 30;

  // Position overlay relative to canvasWrapper, matching canvas grid
  overlay.style.left = (newPosX * tsCanvas + offsetLeft) + 'px';
  overlay.style.top = (newPosY * tsCanvas + offsetTop) + 'px';
  overlay.style.width = (maxLen * tsCanvas) + 'px';
  overlay.style.height = (lineCount * tsCanvas) + 'px';
}

function onCanvasMouseDown(e) {
  if (isPlaying || playGroupState.active) return;
  const wrapper = document.getElementById('canvasWrapper');
  const rect = wrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left - 30;
  const my = e.clientY - rect.top - 30;
  const blockId = findBlockAtPixel(mx, my);
  if (!blockId) return;

  const idx = eventObjIndexMap[blockId];
  if (idx === undefined) return;
  const data = blockList[idx];
  if (data.type !== '打字机') return;

  // Start drag
  draggedBlockId = blockId;
  hoveredBlockId = null;
  dragStartMouse = { x: mx, y: my };
  dragStartBlockPos = { x: parseInt(data.posX) || 0, y: parseInt(data.posY) || 0 };
  isDraggingPreview = false;

  const overlay = document.getElementById('dragOverlay');
  overlay.classList.add('active');
  updateDragOverlay(mx, my);
  renderCanvas();
  e.preventDefault();
}

function onCanvasMouseMove(e) {
  if (isPlaying || playGroupState.active) return;
  const wrapper = document.getElementById('canvasWrapper');
  const rect = wrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left - 30;
  const my = e.clientY - rect.top - 30;

  if (draggedBlockId) {
    // Dragging
    canvasWrapper.style.cursor = 'grabbing';
    if (!isDraggingPreview) {
      const dx = mx - (dragStartMouse ? dragStartMouse.x : mx);
      const dy = my - (dragStartMouse ? dragStartMouse.y : my);
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDraggingPreview = true;
    }
    if (isDraggingPreview) {
      updateDragOverlay(mx, my);
    }
    return;
  }

  // Hover detection
  const blockId = findBlockAtPixel(mx, my);
  canvasWrapper.style.cursor = blockId ? 'grab' : '';
  if (blockId !== hoveredBlockId) {
    hoveredBlockId = blockId;
    renderCanvas();
  }
}

function onCanvasMouseUp(e) {
  if (!draggedBlockId) return;
  const overlay = document.getElementById('dragOverlay');
  overlay.classList.remove('active', 'ready');
  canvasWrapper.style.cursor = '';

  if (isDraggingPreview) {
    const wrapper = document.getElementById('canvasWrapper');
    const rect = wrapper.getBoundingClientRect();
    const mx = e.clientX - rect.left - 30;
    const my = e.clientY - rect.top - 30;
    const ts = 30;
    const dx = Math.round((mx - (dragStartMouse ? dragStartMouse.x : mx)) / ts);
    const dy = Math.round((my - (dragStartMouse ? dragStartMouse.y : my)) / ts);
    const newPosX = dragStartBlockPos ? (dragStartBlockPos.x + dx) : 0;
    const newPosY = dragStartBlockPos ? (dragStartBlockPos.y + dy) : 0;

    // Update block position
    const idx = eventObjIndexMap[draggedBlockId];
    if (idx !== undefined) {
      // Save old values for undo
      const oldX = parseInt(blockList[idx].posX) || 0;
      const oldY = parseInt(blockList[idx].posY) || 0;
      if (oldX !== newPosX) saveUndo('modifyParam', [blockList[idx], 'posX', oldX]);
      if (oldY !== newPosY) saveUndo('modifyParam', [blockList[idx], 'posY', oldY]);
      blockList[idx].posX = newPosX;
      blockList[idx].posY = newPosY;
      renderBlockList(true);
      // Re-render preview at new position
      clearPreview(false, '___PREVIEW___', true, true);
      renderAvailablePreview();
    }
  }

  draggedBlockId = null;
  dragStartMouse = null;
  dragStartBlockPos = null;
  isDraggingPreview = false;
  renderCanvas();
}

function onCanvasMouseLeave() {
  canvasWrapper.style.cursor = '';
  if (!draggedBlockId && hoveredBlockId) {
    hoveredBlockId = null;
    renderCanvas();
  }
}

function drawGrid() {
  if (!showGridLayer1) {
    // When grid is hidden, clear canvas to black
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    return;
  }
  
  const ts = 30;
  // Grid is FIXED (does not follow camera). Only typewriter preview moves with camera.
  // Canvas is at (30,30) in wrapper; overlay starts at (30,0) and (0,30).
  // Grid cell (0,0) is at canvas (0,0) = wrapper (30,30).
  ctx.save();
  // NO camera translate - grid stays fixed
  ctx.translate(0, 0);
  
  // Draw grid lines
  ctx.strokeStyle = 'rgba(80,80,120,0.6)';
  ctx.lineWidth = 1;
  for (let c = 0; c <= 32; c++) {
    ctx.beginPath(); ctx.moveTo(c * ts, 0); ctx.lineTo(c * ts, 18 * ts); ctx.stroke();
  }
  for (let r = 0; r <= 18; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * ts); ctx.lineTo(32 * ts, r * ts); ctx.stroke();
  }
  
  // Draw cell background
  for (let c = 0; c < 32; c++) {
    for (let r = 0; r < 18; r++) {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(c * ts + 1, r * ts + 1, ts - 2, ts - 2);
    }
  }
  
  // Draw "格" character in each cell - 80% of cell size (24px)
  ctx.fillStyle = 'rgba(80,80,120,0.5)';
  ctx.font = 'bold 24px "zpix", "Microsoft YaHei", SimHei, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let c = 0; c < 32; c++) {
    for (let r = 0; r < 18; r++) {
      ctx.fillText('格', c * ts + ts/2 + 2, r * ts + ts/2 - 1);
    }
  }
  
  ctx.restore();
}

function renderLayer(layer, layerIdx) {
  // layerIdx: 0=前景, 1=中景, 2=后景
  // 只影响渲染顺序（由 renderCanvas 控制调用顺序），不影响相机跟随
  // 各层字符均以相同速率跟随相机移动，颜色/透明度保持原样
  const fontSize = 28;
  ctx.font = `bold ${fontSize}px "zpix", "Microsoft YaHei", SimHei, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (const e of layer) {
    let px = e.x * 30, py = e.y * 30;
    if (!e.fixed) {
      px -= camOffsetX * 30;
      py -= camOffsetY * 30;
    }

    // Drag / hover highlight
    const isDrag = e.blockId && e.blockId === draggedBlockId;
    const isHover = !isDrag && e.blockId && e.blockId === hoveredBlockId;

    if (e.showBg) {
      if (isDrag) ctx.fillStyle = 'rgba(79,195,247,0.35)';
      else if (isHover) ctx.fillStyle = 'rgba(129,212,250,0.20)';
      else ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.fillRect(px, py, 30, 30);
    } else if (isDrag || isHover) {
      ctx.fillStyle = isDrag ? 'rgba(79,195,247,0.25)' : 'rgba(129,212,250,0.12)';
      ctx.fillRect(px, py, 30, 30);
    }

    if (e.literal !== '*' && e.literal !== '＿') {
      ctx.fillStyle = `rgb(${e.color.r},${e.color.g},${e.color.b})`;
      ctx.fillText(e.literal, px + 17, py + 15);
    } else if (e.literal === '*') {
      ctx.fillStyle = 'rgba(255,200,0,0.5)';
      ctx.fillRect(px + 2, py + 2, 26, 26);
    }
  }
}

// ==================== TRANSFER OBJECTS ====================

// 更新转移物件实例位置（同名覆盖，产生"漂移"效果）
function updateTransferObjectInstance(name, pos, tags) {
  if (!transferObjects[name]) return;
  const tpl = transferObjects[name];
  transferObjectInstances[name] = {
    pos: { x: pos.x, y: pos.y },
    literal: tpl.text,
    color: tpl.color,
    tags: tags || '',
    layer: tpl.layer ?? 1
  };
}

// 按标签清除转移物件实例
function clearTransferObjectInstances(tag) {
  if (!tag) { transferObjectInstances = {}; return; }
  for (const name in transferObjectInstances) {
    if (transferObjectInstances[name].tags.split(' ').includes(tag)) {
      delete transferObjectInstances[name];
    }
  }
}

function drawTransferObjectsByLayer(layerIdx) {
  // layerIdx: 0=前景, 1=中景, 2=后景
  // 只绘制指定图层的转移物件实例
  const fontSize = 28;
  ctx.font = `bold ${fontSize}px "zpix", "Microsoft YaHei", SimHei, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (const name in transferObjectInstances) {
    const obj = transferObjectInstances[name];
    const objLayer = obj.layer ?? 1;
    if (objLayer !== layerIdx) continue;

    const color = hexToRgb(obj.color);
    const text = obj.literal || '';

    let px = 0, py = 0;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (ch === '＿') { px++; continue; }
      if (ch === '\n') { px = 0; py++; continue; }

      const bx = obj.pos.x + px * 30 - camOffsetX * 30,
            by = obj.pos.y + py * 30 - camOffsetY * 30;
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.fillRect(bx, by, 30, 30);
      ctx.fillStyle = `rgb(${color.r},${color.g},${color.b})`;
      ctx.fillText(ch, bx + 17, by + 15);
      px++;
    }
  }
}

function drawAllTransferObjects() {
  // 按"后→中→前"顺序绘制（与字符渲染顺序一致）
  if (showLayerBack) drawTransferObjectsByLayer(2);
  if (showLayerMid) drawTransferObjectsByLayer(1);
  if (showLayerFront) drawTransferObjectsByLayer(0);
}

function clearTransferObjects(name = '') {
  if (!name) transferObjectInstances = {};
  else delete transferObjectInstances[name];
  renderCanvas();
}

function toggleTransferMenu() {

function hideTransferModal() {

}

function confirmTransferCreate() {
  const name = document.getElementById('transferNameInput').value.trim();
  
  if (window._transferMode === 'delete') {
    if (name) delete transferObjects[name];
    else transferObjects = {};
    } else {
      if (!name) return;
      const text = document.getElementById('transferTextInput').value;

function refreshTransferObjectList() {
  const list = document.getElementById('transferObjectList');

function deleteTransferObj(name) {

}

// ==================== TYPING ANIMATION PREVIEW ====================

function playTypewriterPreview(idStr, btnEl) {
  // 播放事件组时不允许单独预览
  if (playGroupState.active) return;
  
  if (playingId === idStr) {
    // Stop
    isPlaying = false;
    playingId = '';
    clearPreview(true);
    clearTransferObjects();
    renderPreviewForId(idStr);
    if (btnEl) { btnEl.textContent = '▶ 播放预览'; btnEl.classList.remove('btn-danger'); btnEl.classList.add('btn-primary'); }
    // Remove playing indicator
    const blockEl = document.querySelector(`.block-item[data-id="${idStr}"]`);
    if (blockEl) {
      const ind = blockEl.querySelector('.playing-indicator');
      if (ind) ind.remove();
    }
    return;
  }
  
  if (playingId !== '') stopPlaying();
  
  playingId = idStr;
  isPlaying = true;
  if (btnEl) { btnEl.textContent = '■ 停止'; btnEl.classList.remove('btn-primary'); btnEl.classList.add('btn-danger'); }
  
  // Add playing indicator
  const blockEl = document.querySelector(`.block-item[data-id="${idStr}"]`);
  if (blockEl && !blockEl.querySelector('.playing-indicator')) {
    const ind = document.createElement('div'); ind.className = 'playing-indicator'; ind.textContent = '▶ 播放中';
    blockEl.querySelector('.block-header').appendChild(ind);
  }
  
  runTypingAnimation(idStr);
}

function runTypingAnimation(idStr) {
  const idx = eventObjIndexMap[idStr];
  if (idx === undefined) return;
  const data = blockList[idx];
  if (data.type !== '打字机') return;
  
  let posX = parseInt(data.posX) || 0, posY = parseInt(data.posY) || 0;
  let offsetX = parseInt(data.offsetX) || 0, offsetY = parseInt(data.offsetY) || 0;
  const texts = data.texts || '';
  let tags = data.tags || ''; if (!tags) tags = 'default';
  const fixed = !!data.fixed;
  const layer = typeof data.layer === 'number' ? data.layer : LAYER_TABLE.indexOf(data.layer);
  const canSkip = data.can_skip !== false;
  const hasAnim = data.has_animation !== false;
  
  let posX2 = posX, posY2 = posY;
  const delay = hasAnim ? 70 : 0; // ms per character
  
  clearPreview(true);
  
  // Parse same as static preview
  const styleIndices = parseBrackets('<>', texts);
  const noRenderIdx = [];
  const styleColors = [], colorStartPositions = [];
  for (const si of styleIndices) {
    const sp = si[0], cnt = si[1];
    for (let k = sp; k < sp + cnt.length + 2; k++) noRenderIdx.push(k);
    if (cnt.startsWith('/')) { if (styles[cnt.substring(1)] !== undefined) { styleColors.push([cnt.substring(1)]); colorStartPositions.push(sp); }}
    else if (styles[cnt] !== undefined) { styleColors.push(styles[cnt]); colorStartPositions.push(sp); }
  }
  const bracketIdx = parseBrackets('[]', texts);
  const specialIdx = {};
  for (const bi of bracketIdx) {
    const sp = bi[0], cnt = bi[1];
    for (let k = sp; k < sp + cnt.length + 2; k++) noRenderIdx.push(k);
    specialIdx[sp] = transferObjects[cnt.split('{')[0]] ? cnt.split('{')[0] : '*';
  }
  const braceIdx = parseBrackets('{}', texts);
  for (const bi of braceIdx) {
    const sp = bi[0], cnt = bi[1];
    for (let k = sp; k < sp + cnt.length + 2; k++) noRenderIdx.push(k);
  }
  
  let colorStack = [], colorI = 0, ci = 0;
  
  function step() {
    if (!isPlaying || playingId !== idStr) { return; }
    
    while (ci < texts.length) {
      if (!isPlaying || playingId !== idStr) return;
      
      const ch = texts[ci];
      let showBg = true;
      let color = '#FFFFFF';
      if (colorStack.length) color = colorStack[colorStack.length - 1];
      
      if (colorStartPositions.includes(ci)) {
        if (Array.isArray(styleColors[colorI])) {
          const rmName = styleColors[colorI][0];
          const rmColor = styles[rmName];
          const si = colorStack.lastIndexOf(rmColor);
          if (si >= 0) colorStack.splice(si, 1);
        } else colorStack.push(styleColors[colorI]);
        colorI++;
      }
      
      if (ch === '&' || ch === '\n' || ch === '\r') { posX2 = posX; posY2++; ci++; continue; }
      else if (String(ci) in specialIdx) {
        const pPos = gridToPixel(posX2, posY2);
        pPos.x -= camOffsetX * 30; pPos.y -= camOffsetY * 30;
        if (specialIdx[String(ci)] === '*') createCharEntity('*', posX2 - camOffsetX, posY2 - camOffsetY, layer, tags, showBg, fixed, '#FFFFFF');
        else updateTransferObjectInstance(specialIdx[String(ci)], { x: pPos.x + offsetX, y: pPos.y + offsetY }, tags);
        posX2++; ci++;
        callRender();
        playAnimTimer = setTimeout(step, delay);
        return;
      } else if (noRenderIdx.includes(ci)) { ci++; continue; }
      else if (ch === '|') { ci++; playAnimTimer = setTimeout(step, 100); return; }
      else if (ch === '＿') { posX2++; ci++; continue; }
      else {
        createCharEntity(ch, posX2 + offsetX/30, posY2 + offsetY/30, layer, tags, showBg, fixed, color);
        posX2++; ci++;
        callRender();
        playAnimTimer = setTimeout(step, delay);
        return;
      }
    }
    
    // Finished - restore static preview
    isPlaying = false;
    playingId = '';
    clearTransferObjects();
    renderPreviewForId(idStr);
    // Fix: select button by onclick attribute (class changes during play)
    const blockEl = document.querySelector(`.block-item[data-id="${idStr}"]`);

    }
  }
  
  step();
}

// ==================== BLACK MAGIC IMPORT/EXPORT ====================

function dictToBlackMagic(dict) {
  if (dict.type === '普通事件') return dict.texts;
  
  const bm = JSON.parse(JSON.stringify(dict));
  bm.pos = [parseInt(bm.posX)||0, parseInt(bm.posY)||0];
  bm.offset = [parseInt(bm.offsetX)||0, parseInt(bm.offsetY)||0];
  bm.tags = [bm.tags || ''];
  bm.refTexts = Array.isArray(bm.refTexts) ? bm.refTexts : [];
  // char_type / has_se 映射
  const charTypeStr = SFX_TABLE[bm.char_type] ?? null;
  if (charTypeStr === 'none' || charTypeStr === null) {
    bm.has_se = false;
    delete bm.char_type;
  } else if (SFX_TABLE.indexOf(charTypeStr) === 0) {
    // 默认音效 → has_se=true, char_type 省略
    bm.has_se = true;
    delete bm.char_type;
  } else {
    bm.has_se = true;
    bm.char_type = charTypeStr;
  }
  bm.layer = LAYER_TABLE[bm.layer] ?? null;
  bm.texts = (bm.texts||'').replace(/\n/g,'&').replace(/\r/g,'&');
  delete bm.id; delete bm.type;
  delete bm.posX; delete bm.posY; delete bm.offsetX; delete bm.offsetY;
  if (bm.layer === 'mid') delete bm.layer;
  if (bm.offset && bm.offset[0]===0 && bm.offset[1]===0) delete bm.offset;
  if (bm.refTexts && Array.isArray(bm.refTexts) && bm.refTexts.length === 0) delete bm.refTexts;
  if (bm.fixed === false) delete bm.fixed;
  if (bm.has_animation === true) delete bm.has_animation;
  if (bm.can_skip === true) delete bm.can_skip;
  if (bm.need_accept === true) delete bm.need_accept;
  if (bm.wait === true) delete bm.wait;
  if (bm.is_dialog_end === false) delete bm.is_dialog_end;
  if (bm.is_on_top_of_player === false) delete bm.is_on_top_of_player;
  
  // Extract styles
  const styleParse = parseBrackets('<>', bm.texts);
  const usedStyles = [];
  for (const si of styleParse) {
    if (styles.hasOwnProperty(si[1])) usedStyles.push(si[1]);
  }
  if (usedStyles.length > 0) {
    const ls = {};
    for (const sn of usedStyles) {
      const sv = styles[sn];
      if (typeof sv === 'string' && /^#[0-9a-f]{6}$/i.test(sv)) ls[sn] = { text_color: sv };
      else if (typeof sv === 'number') ls[sn] = { char_type: SFX_TABLE[sv] };
      else if (typeof sv === 'string') ls[sn] = { tags: sv };
    }
    if (Object.keys(ls).length) bm.label_settings = ls;
  }
  
  return bm;
}

// === 字符实体格式化（内部使用） ===
function _fmtKV(key, val, comma) {
  const c = comma ? ',' : '';
  if (key === 'label_settings') return '\t"' + key + '": ' + JSON.stringify(val) + c;
  if (Array.isArray(val)) return '\t"' + key + '": [' + val.map(v => JSON.stringify(v)).join(', ') + ']' + c;
  return '\t"' + key + '": ' + JSON.stringify(val) + c;
}

function formatBlackMagicJSON(bm) {
  const keys = Object.keys(bm);
  const lines = ['{'];
  for (let i = 0; i < keys.length; i++) {
    lines.push(_fmtKV(keys[i], bm[keys[i]], i < keys.length - 1));
  }
  lines.push('}');
  return lines.join('\n');
}
