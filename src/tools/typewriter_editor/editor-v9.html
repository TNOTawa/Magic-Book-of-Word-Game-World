// === 黑魔法行级解析器 ===
// 将原始文本按行解析为"块"列表，每个块 = { type, lines, comment }
function parseBlackMagicBlocks(fullText) {
  const rawLines = fullText.split('\n');
  const blocks = [];
  let pendingComment = '';
  let i = 0;
  
  while (i < rawLines.length) {
    let line = rawLines[i];
    const trimmed = line.trimStart();
    
    // 空白行跳过（不重置 pendingComment，保证跨空白行的注释关联）
    if (!trimmed) { i++; continue; }
    
    // # 注释 → 挂起等待下一个块
    if (trimmed.startsWith('#')) {
      pendingComment = trimmed.substring(1).trim();
      i++; continue;
    }
    
    // @[type] 或 @[type_parallel] → 打字机块
    if (trimmed.startsWith('@[type]') || trimmed.startsWith('@[type_parallel]')) {
      const isParallel = trimmed.startsWith('@[type_parallel]');
      let blockText = line;
      i++;
      
      // 逐行追加，直到 extractJSON 能成功提取完整 JSON
      while (i < rawLines.length) {
        blockText += '\n' + rawLines[i];
        i++;
        if (extractJSON(blockText)) break;
      }
      
      blocks.push({
        type: 'typewriter',
        isParallel: isParallel,
        text: blockText,
        comment: pendingComment
      });
      pendingComment = '';
      continue;
    }
    
    // @[其他] → 普通事件（收集续行直到下一个 @[ 或 #）
    if (trimmed.startsWith('@[')) {
      let eventText = line;
      i++;
      
      while (i < rawLines.length) {
        const cl = rawLines[i];
        const ct = cl.trimStart();
        // 碰到下一个指令或注释 → 停止
        if (ct.startsWith('@[') || ct.startsWith('#')) break;
        // Tab/空格开头的行 → 续行
        if (cl.startsWith('\t') || cl.startsWith(' ')) {
          eventText += '\n' + cl;
          i++;
        } else {
          break;
        }
      }
      
      // 若前一行有注释，从注释行开始截取内容字符串
      const fullText = pendingComment
        ? ('# ' + pendingComment + '\n' + eventText)
        : eventText;
      
      blocks.push({
        type: 'plain',
        text: fullText,
        comment: pendingComment
      });
      pendingComment = '';
      continue;
    }
    
    // Tab/空格开头的行（不属于任何块 → 跳过）
    i++;
  }
  
  return blocks;
}

// === 黑魔法 JSON 提取（简易深度计数，不重复造轮子） ===
// 上面已有 extractJSON，这里直接复用

function blackMagicToDict(block) {
  // block = { type, text, isParallel?, comment? }
  const text = block.text || '';
  
  if (block.type === 'plain') {
    const evt = JSON.parse(JSON.stringify(DEFAULT_EVENT));
    evt.id = genId();
    let contentText = text.trim();
    // 若内容以 # 注释开头，提取为 remark
    if (contentText.startsWith('#')) {
      const nlIdx = contentText.indexOf('\n');
      if (nlIdx > -1) {
        evt.remark = contentText.substring(1, nlIdx).trim();
        contentText = contentText.substring(nlIdx + 1).trim();
      }
    }
    evt.texts = contentText;
    return evt;
  }
  
  // typewriter 块
  const jsonStr = extractJSON(text);
  if (!jsonStr) return null;
  
  let dict;
  try { dict = JSON.parse(jsonStr); }
  catch(e) { return null; }
  
  dict.type = '打字机';
  dict.id = genId();
  
  // 备注：注释 + 平行标记（若注释已含"平行"则不重复追加）
  const comment = block.comment || '';
  if (block.isParallel && !comment.includes('平行')) {
    dict.remark = comment ? comment + ' 平行' : '平行';
  } else {
    dict.remark = comment;
  }
  
  // 标准化字段
  if ('pos' in dict) { dict.posX = dict.pos[0]; dict.posY = dict.pos[1]; }
  if ('offset' in dict) { dict.offsetX = dict.offset[0]; dict.offsetY = dict.offset[1]; }
  if ('tags' in dict && Array.isArray(dict.tags)) dict.tags = dict.tags[0] || '';
  if ('char_type' in dict) { const ci = SFX_TABLE.indexOf(dict.char_type); dict.char_type = ci >= 0 ? ci : 0; }
  if ('layer' in dict) { const li = LAYER_TABLE.indexOf(dict.layer); dict.layer = li >= 0 ? li : 1; }
  if ('has_se' in dict) { if (dict.has_se === false) dict.char_type = 1; delete dict.has_se; }
  
  const boolKeys = ['fixed', 'has_animation', 'can_skip', 'need_accept', 'wait', 'is_dialog_end', 'is_on_top_of_player'];
  for (const k of boolKeys) { if (k in dict) dict[k] = !!dict[k]; }
  
  for (const key in DEFAULT_TYPE_EVENT) {
    if (!(key in dict)) dict[key] = DEFAULT_TYPE_EVENT[key];
  }
  
  return dict;
}

// === 样式冲突检测 & 去重处理 ===
// 传入一批 dict，扫描所有 label_settings，完成：
//   1. 同批次同名不同色 → 报错返回 false
//   2. 与现有 styles 冲突 → 自动更名（a→a_1）并替换文本中所有 <a></a>
//   3. 同批次去重 → 同名同色只创建一个样式
// 返回 true（成功）或 false（冲突）
function _resolveLabelSettings(dicts) {
  // 辅助：从 label_settings 条目解析出 styles[name] 对应值
  function _resolveStyleValue(sd) {
    if (sd.text_color) return sd.text_color;           // 颜色样式 → "#ff0000"
    if (sd.char_type !== undefined) {                    // 音效样式 → 索引号
      const idx = SFX_TABLE.indexOf(sd.char_type);
      return idx >= 0 ? idx : null;
    }
    if (sd.tags !== undefined) return sd.tags;           // 标签样式 → 字符串
    return null;
  }

  // Phase 1: 收集所有 label_settings，按名字聚合样式值
  const nameValueMap = {};  // name → styles[name]
  for (const d of dicts) {
    if (!d.label_settings) continue;
    for (const sn in d.label_settings) {
      const sd = d.label_settings[sn];
      const sv = _resolveStyleValue(sd);
      if (sv === null) continue;
      // 同一批次内同名不同值 → 不相同样式不能重名
      if (nameValueMap.hasOwnProperty(sn) && nameValueMap[sn] !== sv) {
        alert('不相同样式不能重名：样式名 "' + sn + '" 在同一批导入中被赋予了不同的值，请检查后重试。');
        return false;
      }
      nameValueMap[sn] = sv;
    }
  }

  // Phase 2: 决定每个样式的最终名称 & 创建
  const renameMap = {};          // 原始名 → 最终名
  const createdInBatch = {};     // 本批次去重

  for (const sn in nameValueMap) {
    const sv = nameValueMap[sn];

    if (!styles.hasOwnProperty(sn)) {
      // 无同名样式 → 直接创建
      renameMap[sn] = sn;
    } else if (styles[sn] === sv) {
      // 有同名样式且值一致 → 复用
      renameMap[sn] = sn;
    } else {
      // 有同名样式但值不同 → 需要更名
      let ni = 1, nn;
      do { nn = sn + '_' + ni; ni++; }
      while (styles.hasOwnProperty(nn) || createdInBatch.hasOwnProperty(nn));
      renameMap[sn] = nn;
    }
  }

  // Phase 3: 创建样式 + 替换文本中的标签
  for (const d of dicts) {
    if (!d.label_settings) continue;
    for (const sn in d.label_settings) {
      const sd = d.label_settings[sn];
      const sv = _resolveStyleValue(sd);
      if (sv === null) continue;

      const finalName = renameMap[sn];
      if (!finalName) continue;

      // 如果更名了，替换文本中所有标签引用
      if (finalName !== sn && d.texts) {
        d.texts = d.texts
          .replace(new RegExp('<' + sn + '>', 'g'), '<' + finalName + '>')
          .replace(new RegExp('</' + sn + '>', 'g'), '</' + finalName + '>');
      }

      // 本批次去重：同名同值只创建一次
      if (!createdInBatch[finalName] && !styles.hasOwnProperty(finalName)) {
        addStyle(finalName, sv);
        createdInBatch[finalName] = true;
      }
    }
    delete d.label_settings;
  }

  return true;
}

function importBlackMagicGroup(fullText) {
  const blocks = parseBlackMagicBlocks(fullText);
  if (!blocks.length) return;

  // Phase 1: 解析所有 dict
  const dicts = [];
  const undoIds = [];
  for (const block of blocks) {
    const d = blackMagicToDict(block);
    if (!d || typeof d !== 'object') continue;
    dicts.push(d);
    undoIds.push(d.id);
  }
  if (!dicts.length) return;

  // Phase 2: 统一处理 label_settings（批量去重 + 冲突检测）
  if (!_resolveLabelSettings(dicts)) return;

  // Phase 3: 插入
  const insertPos = selectedIds.length > 0 ? (eventObjIndexMap[selectedIds[selectedIds.length - 1]] ?? -1) : -1;
  if (insertPos === -1) {
    for (const d of dicts) { blockList.push(d); eventIdList.push(d.id); }
  } else {
    let ip = insertPos;
    for (const d of dicts) {
      ip++;
      blockList.splice(ip, 0, d);
      eventIdList.splice(ip, 0, d.id);
    }
  }

  renderBlockList(insertPos >= 0);
  saveUndo('create', undoIds, false);
}

function importSingleBlack(fullText) {
  const blocks = parseBlackMagicBlocks(fullText);
  if (!blocks.length) return;
  
  const dicts = [];
  for (const block of blocks) {
    const d = blackMagicToDict(block);
    if (!d || typeof d !== 'object') continue;
    dicts.push(d);
  }
  if (!dicts.length) return;

  if (!_resolveLabelSettings(dicts)) return;

  for (const dict of dicts) {
    const id = dict.id;
    const insertPos = selectedIds.length > 0 ? (eventObjIndexMap[selectedIds[selectedIds.length - 1]] ?? -1) : -1;
    if (insertPos === -1) { blockList.push(dict); eventIdList.push(id); renderBlockList(false); }
    else { blockList.splice(insertPos + 1, 0, dict); eventIdList.splice(insertPos + 1, 0, id); renderBlockList(true); }
    saveUndo('create', id, false);
  }
}

// ==================== STYLE MANAGEMENT ====================

function showStyleModal(mode) {
  window._styleMode = mode || 'create';
  document.getElementById('styleModalTitle').textContent = mode === 'modify' ? '修改样式' : '创建样式';
  document.getElementById('styleNameInput').value = '';
  document.getElementById('styleColorPicker').value = '#ffffff';
  document.getElementById('styleTagsInput').value = '';
  document.getElementById('styleErrorMsg').style.display = 'none';
  switchEffectType('color');
  document.getElementById('styleModal').classList.remove('hidden');
  populateStyleSoundGrid();
}

function hideStyleModal() {
  document.getElementById('styleModal').classList.add('hidden');
}

function switchEffectType(type) {
  document.querySelectorAll('.style-effect-tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
  document.getElementById('effectColorArea').style.display = type === 'color' ? '' : 'none';
  document.getElementById('effectSoundArea').style.display = type === 'sound' ? '' : 'none';
  document.getElementById('effectTagsArea').style.display = type === 'tags' ? '' : 'none';
  window._styleEffectType = type;
}

function populateStyleSoundGrid() {
  const grid = document.getElementById('styleSoundGrid');
  grid.innerHTML = SFX_CN.map((n, i) => `<button class="sl-btn ${i===0?'active':''}" onclick="selectStyleSfx(${i},this)">${n}</button>`).join('');
}

let _styleCurrentSfx = 0;
function selectStyleSfx(idx, btn) {
  btn.parentElement.querySelectorAll('.sl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _styleCurrentSfx = idx;
}

function confirmStyleCreate() {
  const name = document.getElementById('styleNameInput').value.trim();
  const errEl = document.getElementById('styleErrorMsg');
  
  let val;
  if (window._styleEffectType === 'sound') val = _styleCurrentSfx;
  else if (window._styleEffectType === 'color') val = document.getElementById('styleColorPicker').value;
  else if (window._styleEffectType === 'tags') val = document.getElementById('styleTagsInput').value.trim();
  else { return; }
  
  if (!name) { showStyleError('名称是空的！！！请不要尝试创建空名样式'); return; }
  if (styles.hasOwnProperty(name) && name !== (window._styleModifyName||'')) { showStyleError('重名啦！！你设定的样式名称已存在。'); return; }
  
  if (window._styleMode === 'modify' && window._styleModifyName) {
    removeStyle(window._styleModifyName);
  }
  
  addStyle(name, val);
  hideStyleModal();
  clearPreview(true);
  renderAvailablePreview();
}

function showStyleError(msg) {
  const el = document.getElementById('styleErrorMsg');
  el.textContent = msg; el.style.display = '';
  el.style.animation = 'none'; void el.offsetWidth; el.style.animation = 'shake 0.5s';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function addStyle(name, val) {
  if (name in styles || val == null) return;
  styles[name] = val;
  styleYPos += 38;
  renderStyleList();
}

function removeStyle(name) {
  if (!(name in styles)) return;
  delete styles[name];
  styleYPos = Math.max(0, styleYPos - 38);
  renderStyleList();
}

function modifyStyleFromUI(name) {
  // Called when clicking modify on a style item
  window._styleModifyName = name;
  window._styleMode = 'modify';
  document.getElementById('styleModalTitle').textContent = '修改样式';
  document.getElementById('styleNameInput').value = name;
  
  const val = styles[name];
  if (/^#[0-9a-f]{6}$/i.test(val)) { switchEffectType('color'); document.getElementById('styleColorPicker').value = val; }
  else if (typeof val === 'number') { switchEffectType('sound'); _styleCurrentSfx = val; populateStyleSoundGrid(); }
  else if (typeof val === 'string') { switchEffectType('tags'); document.getElementById('styleTagsInput').value = val; }
  
  document.getElementById('styleErrorMsg').style.display = 'none';
  document.getElementById('styleModal').classList.remove('hidden');
}

function deleteStyleFromUI(name) {
  removeStyle(name);
  clearPreview(true);
  renderAvailablePreview();
  renderStyleList();
}

function renderStyleList() {
  const list = document.getElementById('styleList');
  const names = Object.keys(styles);
  if (names.length === 0) {
    list.innerHTML = '<div style="color:#555;font-size:11px;padding:10px;text-align:center">暂无样式<br><br>点击上方创建</div>';
    return;
  }
  list.innerHTML = names.map(n => {
    const v = styles[n];
    let swatch = '';
    if (/^#[0-9a-f]{6}$/i.test(v)) swatch = `<div class="style-color-swatch" style="background:${v}"></div>`;
    else if (typeof v === 'number') swatch = `<span style="font-size:10px;color:#aaa">♪${SFX_CN[v]||''}</span>`;
    else swatch = `<span style="font-size:10px;color:#aaa">#${v}</span>`;
    let prefix = '';
    if (typeof v === 'number') prefix = SFX_CN[v] + ' ';
    else if (typeof v === 'string' && !/^#/.test(v)) prefix = v + ' ';
    
    return `<div class="style-item" onclick="onStyleClick('${n.replace(/'/g, "\\'")}')" ondblclick="event.stopPropagation();modifyStyleFromUI('${n.replace(/'/g, "\\'")}')">
      ${swatch}<span class="style-name">${prefix}${n}</span>
      <span class="style-modify" onclick="event.stopPropagation();modifyStyleFromUI('${n.replace(/'/g, "\\'")}')">改</span>
      <span class="style-del" onclick="event.stopPropagation();deleteStyleFromUI('${n.replace(/'/g, "\\'")}')">删</span>
    </div>`;
  }).join('');
}

function insertStyleTag(name) {
  // Insert <name>selected_text</name> into focused textarea
  const focused = document.activeElement;
  if (focused && (focused.tagName === 'TEXTAREA' || focused.tagName === 'INPUT')) {
    const start = focused.selectionStart, end = focused.selectionEnd;
    const text = focused.value;
    focused.value = text.substring(0, start) + '<' + name + '>' + text.substring(start, end) + '</' + name + '>' + text.substring(end);
    focused.selectionStart = focused.selectionEnd = start + name.length * 2 + 5;
    focused.focus();
  }
}

// ==================== STYLE CLICK TO WRAP ====================
function onStyleClick(name) {
  // Insert <name> at cursor in active textarea, or wrap selection
  const focused = document.activeElement;
  if (focused && focused.id && focused.id.startsWith('txt_')) {
    const start = focused.selectionStart;
    const end = focused.selectionEnd;
    const text = focused.value;
    if (start !== end) {
      // Wrap selected text
      focused.value = text.substring(0, start) + '<' + name + '>' + text.substring(start, end) + '</' + name + '>' + text.substring(end);
      focused.selectionStart = focused.selectionEnd = end + name.length * 2 + 5;
    } else {
      // Insert opening tag, position cursor after it
      focused.value = text.substring(0, start) + '<' + name + '>' + text.substring(end);
      focused.selectionStart = focused.selectionEnd = start + name.length + 2;
    }
    focused.focus();
    const idStr = focused.id.replace('txt_', '');
    onTextChanged(idStr);
  } else if (expandedId && expandedType === '打字机') {
    // No focused textarea, but a typewriter block is expanded - use its textarea
    const ta = document.getElementById('txt_' + expandedId);
    if (ta) {
      ta.focus();
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      const text = ta.value;
      if (start !== end) {
        ta.value = text.substring(0, start) + '<' + name + '>' + text.substring(start, end) + '</' + name + '>' + text.substring(end);
        ta.selectionStart = ta.selectionEnd = end + name.length * 2 + 5;
      } else {
        ta.value = text.substring(0, start) + '<' + name + '>' + text.substring(end);
        ta.selectionStart = ta.selectionEnd = start + name.length + 2;
      }
      onTextChanged(expandedId);
    }
  }
}
// ==================== KEYBOARD SHORTCUTS ====================

document.addEventListener('keydown', (e) => {
  const tag = e.target.tagName;
  if (tag === 'TEXTAREA' || tag === 'INPUT') return;
  
  // 播放事件组期间只允许空格键和 Ctrl+C
  if (playGroupState.active) {
    if (e.key === ' ') {
      e.preventDefault();
      // 优先：确认所有标识
      if (playGroupState.acceptMarkers.length > 0) {
        removeAllAcceptMarkers();
        // 检查是否应该继续
        checkPlaybackProgress();
      } else {
        // 跳过所有可跳过的打字动画
        skipTypewriter();
      }
    }
    // Ctrl+C 仍允许复制
    if (!(e.ctrlKey && e.key === 'c')) return;
  }
  
  if (e.key === 'Delete' || e.key === 'Backspace') { deleteSelected(); e.preventDefault(); }
  else if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { doUndo(); e.preventDefault(); }
  else if ((e.ctrlKey && e.key === 'y' && !e.shiftKey) || (e.ctrlKey && e.shiftKey && e.key === 'Z')) { doRedo(); e.preventDefault(); }
  else if (e.ctrlKey && e.key === 'a' && !e.shiftKey) { selectAll(); e.preventDefault(); }
  else if (e.ctrlKey && e.key === 'i' && !e.shiftKey) { invertSelection(); e.preventDefault(); }
  else if (e.ctrlKey && e.key === 'c' && !e.shiftKey) { copyBlocks(); e.preventDefault(); }
  else if (e.ctrlKey && e.key === 'x' && !e.shiftKey) { cutBlocks(); e.preventDefault(); }
  else if (e.ctrlKey && e.key === 'v' && !e.shiftKey) { pasteBlocks(); e.preventDefault(); }
  else if (e.ctrlKey && e.key === 'd' && !e.shiftKey) { duplicateBlocks(); e.preventDefault(); }
});

// ==================== PLAY EVENT GROUP ====================
//
// 架构：字符实体系统
// ─────────────────────────────
// 所有显示的文字都是"字符实体"，存储在全局图层表 bgLayer/midLayer/fgLayer 中。
// 每个实体声明：{ id, literal(字面), color(颜色), tags(标签), x, y(网格坐标), showBg, fixed }
//
// 打字机 = 字符实体生成器
// ─────────────────────────────
// 每个打字机积木启动一个独立生成器 (typingState)，按固定周期（50ms/字）产出实体。
// 生成器维护自己的光标位置、样式栈、已解析文本队列。
// wait=false 时不阻塞后续积木 → 多个生成器并行运行。
//
// 清除 = 按标签过滤实体
// ─────────────────────────────
// clear_typed 按 __PB__ 标签清除实体，不关心是哪个打字机生成的。
// 清除只移除已生成的实体，生成器本身继续运行。这就是"清到一半只清已生成部分"的原因。

// 播放状态
let playGroupState = {
  active: false,
  currentIndex: -1,
  typingStates: [],     // [{ id, active, textChars, currentCharIndex, skipRequested, canSkip, needAccept, isDialogEnd, blockId, cursorX, cursorY, startX, startY, _layer, _tags, _fixed, styleStack: [], timers: [] }]
  acceptMarkers: [],    // [{ char, _entryIdx, _layerArr }]
  timers: []            // 积木级定时器（事件指令等）
};

function playEventGroup() {
  if (playGroupState.active) {
    stopPlayingGroup();
    return;
  }
  if (blockList.length === 0) return;
  
  playGroupState.active = true;
  playGroupState.currentIndex = 0;
  playGroupState.typingStates = [];
  playGroupState.acceptMarkers = [];
  document.getElementById('btnPlayGroup').textContent = '⏹ 停止播放';
  document.getElementById('btnPlayGroup').classList.add('btn-danger');
  document.getElementById('btnPlayGroup').classList.remove('btn-primary');
  document.getElementById('btnClearPreview').disabled = true;
  document.getElementById('statusText').textContent = '播放中 (Space跳过/确认) | 快捷键: Ctrl+Z撤销 Ctrl+Y重做';
  
  // 清除预览 + 上次播放残留
  clearPreview(true);
  clearPlaybackChars();
  
  // 收起展开的积木 + 禁止拖拽排序
  if (expandedId) collapseBlock(expandedId);
  if (sortableInstance) sortableInstance.option('disabled', true);
  
  playNextBlock();
}

function stopPlayingGroup() {
  playGroupState.active = false;
  playGroupState.currentIndex = -1;
  
  // 停止所有打字动画
  for (const ts of playGroupState.typingStates) {
    ts.active = false;
    ts.timers.forEach(t => clearTimeout(t));
    ts.timers = [];
  }
  playGroupState.typingStates = [];
  playGroupState.acceptMarkers = [];
  
  // 清除所有定时器
  playGroupState.timers.forEach(t => clearTimeout(t));
  playGroupState.timers = [];
  
  document.getElementById('btnPlayGroup').textContent = '▶ 播放事件组';
  document.getElementById('btnPlayGroup').classList.remove('btn-danger');
  document.getElementById('btnPlayGroup').classList.add('btn-primary');
  document.getElementById('btnClearPreview').disabled = false;
  
  // 移除播放高亮
  document.querySelectorAll('.block-item.playing').forEach(el => el.classList.remove('playing'));
  
  // 精确清除播放期间渲染的字符
  clearPlaybackChars();
  
  document.getElementById('statusText').textContent = '播放已停止 | 快捷键: Ctrl+Z撤销 Ctrl+Y重做 Ctrl+A全选';
  
  // 恢复静态预览
  renderAvailablePreview();
  
  // 恢复积木拖拽排序
  if (sortableInstance) sortableInstance.option('disabled', false);
}

function playNextBlock() {
  if (!playGroupState.active) return;
  
  if (playGroupState.currentIndex >= blockList.length) {
    // 所有积木已处理完毕——但可能还有打字动画在跑
    if (playGroupState.typingStates.length === 0 && playGroupState.acceptMarkers.length === 0) {
      stopPlayingGroup();
      document.getElementById('statusText').textContent = '播放完成 | 快捷键: Ctrl+Z撤销 Ctrl+Y重做 Ctrl+A全选';
    }
    return;
  }
  
  const block = blockList[playGroupState.currentIndex];
  
  // 高亮当前播放的积木
  highlightPlayingBlock(block.id);
  
  if (block.type === '打字机') {
    playTypewriterBlock(block);
  } else if (block.type === '普通事件') {
    playEventBlock(block);
  } else {
    // 未知类型，跳过
    playGroupState.currentIndex++;
    playNextBlock();
  }
}

function highlightPlayingBlock(id) {
  document.querySelectorAll('.block-item.playing').forEach(el => el.classList.remove('playing'));
  const blockEl = document.querySelector(`.block-item[data-id="${id}"]`);
  if (blockEl) {
    blockEl.classList.add('playing');
    blockEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// 解析打字机文本：预扫描样式标签边界，标注进入/退出，符用栈解决嵌套
// 输出数组每项：{type:'char',char,...} 或 {type:'enter_style'|'exit_style',styleName}
function parseTypewriterText(texts) {
  const result = [];
  
  // ---- 第一遍：预扫描 <> [] {} 标签位置 ----
  const noRenderSet = new Set();
  const markers = {};        // pos → {type, styleName}
  const transferMarkers = {}; // pos → objName|null
  
  // <> 样式标签
  const styleIndices = parseBrackets('<>', texts);
  for (const si of styleIndices) {
    const startPos = si[0], content = si[1];
    for (let k = startPos; k < startPos + content.length + 2; k++) noRenderSet.add(k);
    if (content.startsWith('/')) {
      const sName = content.substring(1);
      if (sName && styles.hasOwnProperty(sName)) {
        markers[startPos] = { type: 'exit_style', styleName: sName };
      }
    } else if (styles.hasOwnProperty(content)) {
      markers[startPos] = { type: 'enter_style', styleName: content };
    }
  }
  
  // [] 转移物件 / 特殊渲染
  const bracketIndices = parseBrackets('[]', texts);
  for (const bi of bracketIndices) {
    const startPos = bi[0], content = bi[1];
    for (let k = startPos; k < startPos + content.length + 2; k++) noRenderSet.add(k);
    const objName = content.split('{')[0];
    transferMarkers[startPos] = transferObjects[objName] ? objName : null;
  }
  
  // {} 花括号（参数等，不渲染）
  const braceIndices = parseBrackets('{}', texts);
  for (const bi of braceIndices) {
    const startPos = bi[0], content = bi[1];
    for (let k = startPos; k < startPos + content.length + 2; k++) noRenderSet.add(k);
  }
  
  // ---- 第二遍：逐字遍历，插入标注和字符 ----
  let i = 0;
  while (i < texts.length) {
    // 样式标注
    if (markers[i]) {
      result.push(markers[i]);
      i++;
      // 只跳过同一对 <> 内部的字符，遇到下一个标注位置就停
      while (i < texts.length && noRenderSet.has(i) && !markers[i] && !transferMarkers.hasOwnProperty(i)) i++;
      continue;
    }
    
    // 转移物件标注
    if (transferMarkers.hasOwnProperty(i)) {
      const name = transferMarkers[i];
      if (name) {
        result.push({ type: 'char', char: '*', isTransfer: true, transferName: name });
      }
      i++;
      // 只跳过同一对 [] 内部的字符，遇到下一个标注位置就停
      while (i < texts.length && noRenderSet.has(i) && !markers[i] && !transferMarkers.hasOwnProperty(i)) i++;
      continue;
    }
    
    // 跳过非渲染位置
    if (noRenderSet.has(i)) { i++; continue; }
    
    const ch = texts[i];
    if (ch === '|')      { result.push({ type: 'char', char: '|', isPause: true }); i++; continue; }
    if (ch === '&' || ch === '\n' || ch === '\r') { result.push({ type: 'char', char: '\n', isNewline: true }); i++; continue; }
    if (ch === '＿')    { i++; continue; }  // 下划线占位跳过
    
    // 普通字符
    result.push({ type: 'char', char: ch });
    i++;
  }
  
  return result;
}

function playTypewriterBlock(block) {
  const texts = block.texts || '';
  const canSkip = block.can_skip !== false;
  const needAccept = block.need_accept === true;
  const isDialogEnd = block.is_dialog_end === true;
  const pauseGame = block.wait !== false;  // wait 默认 true → 暂停游戏
  const hasAnimation = block.has_animation !== false;
  
  // 计算起始光标位置
  const startX = (parseInt(block.posX) || 0) + (parseInt(block.offsetX) || 0);
  const startY = (parseInt(block.posY) || 0) + (parseInt(block.offsetY) || 0);
  const layer = typeof block.layer === 'number' ? block.layer : 1;
  const tags = block.tags || 'default';
  const fixed = !!block.fixed;
  
  // 解析文本
  const parsedChars = parseTypewriterText(texts);
  
  // 创建独立 typing 状态
  const typingState = {
    id: block.id + '_' + Date.now() + Math.random(),
    active: true,
    text: texts,
    textChars: parsedChars,
    currentCharIndex: 0,
    skipRequested: false,
    canSkip: canSkip,
    needAccept: needAccept,
    isDialogEnd: isDialogEnd,
    blockId: block.id,
    cursorX: startX,
    cursorY: startY,
    startX: startX,
    startY: startY,
    _layer: layer,
    _tags: tags,
    _fixed: fixed,
    styleStack: [],   // 独立样式栈
    timers: [],        // 独立定时器
    hasAnimation: hasAnimation
  };
  
  playGroupState.typingStates.push(typingState);
  
  // 不再自动清屏——清理由 clear_typed 事件显式触发
  // 每个打字机独立渲染到共享图层，字符自带 __PB__ 标记
  
  // 开始逐字动画
  typewriterAnimationStep(typingState);
  
  // wait=false：不阻塞，立即进入下一个积木
  if (!pauseGame) {
    playGroupState.currentIndex++;
    playNextBlock();
  }
  // wait=true 时，由 finishTypewriter 或用户确认后推进
}

function typewriterAnimationStep(ts) {
  if (!ts.active) return;  // 已被停止
  
  const entries = ts.textChars;
  
  if (ts.currentCharIndex >= entries.length) {
    finishTypewriter(ts);
    return;
  }
  
  // 跳过请求：瞬间渲染所有剩余内容
  if (ts.skipRequested) {
    while (ts.currentCharIndex < entries.length) {
      processCharEntry(ts, entries[ts.currentCharIndex]);
      ts.currentCharIndex++;
    }
    renderCanvas();
    finishTypewriter(ts);
    return;
  }
  
  const entry = entries[ts.currentCharIndex];
  
  // 标注项（进入/退出样式）——不延时，立即处理
  if (entry.type === 'enter_style' || entry.type === 'exit_style') {
    applyStyleAnnotation(ts, entry);
    ts.currentCharIndex++;
    typewriterAnimationStep(ts);  // 递归立即处理下一个
    return;
  }
  
  // 可渲染条目 —— 字符作为实体写入全局表
  processCharEntry(ts, entry);
  ts.currentCharIndex++;
  renderCanvas();
  
  // 打字周期：有动画 50ms/字，无动画 0ms（瞬间生成）
  const cycleDelay = ts.hasAnimation ? 50 : 0;
  const timer = setTimeout(() => typewriterAnimationStep(ts), cycleDelay);
  ts.timers.push(timer);
}

// 应用样式标注（进入/退出样式标签）
function applyStyleAnnotation(ts, entry) {
  if (entry.type === 'enter_style') {
    ts.styleStack.push({ name: entry.styleName, data: styles[entry.styleName] });
  } else if (entry.type === 'exit_style') {
    for (let i = ts.styleStack.length - 1; i >= 0; i--) {
      if (ts.styleStack[i].name === entry.styleName) {
        ts.styleStack.splice(i, 1);
        break;
      }
    }
  }
}

// 从样式栈计算当前颜色和标签列表
function getCurrentStyleState(ts) {
  let color = '#FFFFFF';
  const tagList = [];
  for (const entry of ts.styleStack) {
    const data = entry.data;
    if (typeof data === 'string' && /^#[0-9a-f]{6}$/i.test(data)) {
      color = data;
    } else if (typeof data === 'string' && data.length > 0 && !data.startsWith('#')) {
      tagList.push(data);
    }
    // number (音效) 忽略
  }
  return { color, tagList };
}

// 处理单条解析结果（字符、暂停、换行、转移物件）
function processCharEntry(ts, entry) {
  const layer = ts._layer;
  const baseTags = ts._tags;
  const fixed = ts._fixed;
  
  if (entry.isPause) return;
  
  if (entry.isNewline) {
    ts.cursorX = ts.startX;
    ts.cursorY++;
    return;
  }
  
  if (entry.isTransfer) {
    const name = entry.transferName;
    if (transferObjects[name]) {
      const pixelPos = gridToPixel(ts.cursorX, ts.cursorY);
      pixelPos.x -= camOffsetX * 30; pixelPos.y -= camOffsetY * 30;
      const allTags = ['__PB__', baseTags].filter(Boolean).join(' ') || '__PB__';
      updateTransferObjectInstance(name, pixelPos, allTags);
    }
    ts.cursorX++;
    return;
  }
  
  // 普通字符 —— 创建字符实体，打上 __PB__ 标签
  const styleState = getCurrentStyleState(ts);
  const color = styleState.color;
  const allTags = ['__PB__', baseTags, ...styleState.tagList].filter(Boolean).join(' ') || '__PB__ default';
  
  createCharEntity(entry.char, ts.cursorX, ts.cursorY, layer, allTags, true, fixed, color);
  ts.cursorX++;
}

// === 确认标识（作为字符实体渲染）===

function addAcceptMarker(ts) {
  const isDialogEnd = ts.isDialogEnd;
  const char = isDialogEnd ? '▼' : '▽';
  
  const styleState = getCurrentStyleState(ts);
  const allTags = ['__PB__', ts._tags, ...styleState.tagList].filter(Boolean).join(' ') || '__PB__ default';
  
  const entity = createCharEntity(char, ts.cursorX, ts.cursorY, ts._layer, allTags, true, ts._fixed, styleState.color || '#FFFFFF');
  
  playGroupState.acceptMarkers.push({ char, entityId: entity.id });
  renderCanvas();
}

function removeAllAcceptMarkers() {
  for (const am of playGroupState.acceptMarkers) {
    for (const layer of [bgLayer, midLayer, fgLayer]) {
      const idx = layer.findIndex(e => e.id === am.entityId);
      if (idx >= 0) { layer.splice(idx, 1); break; }
    }
  }
  playGroupState.acceptMarkers = [];
  renderCanvas();
}

// 精确清除所有播放期间渲染的字符实体（按 __PB__ 标签）
function clearPlaybackChars() {
  clearEntitiesByTag('__PB__');
  clearTransferObjectInstances('__PB__');
  playGroupState.acceptMarkers = [];
  renderCanvas();
}

// === 打字完成逻辑 ===

function finishTypewriter(ts) {
  ts.active = false;
  // 清理该 typing 的定时器
  ts.timers.forEach(t => clearTimeout(t));
  ts.timers = [];
  
  if (ts.needAccept) {
    // 需要确认：渲染标识
    addAcceptMarker(ts);
    // 检查是否应该推进（wait=true 模式且这是唯一活跃打字机）
    checkPlaybackProgress();
  } else {
    // 不需确认：移除该 typing 状态
    removeTypingState(ts);
    checkPlaybackProgress();
  }
}

function removeTypingState(ts) {
  const idx = playGroupState.typingStates.indexOf(ts);
  if (idx >= 0) playGroupState.typingStates.splice(idx, 1);
}

// 检查播放是否应该推进
function checkPlaybackProgress() {
  if (!playGroupState.active) return;
  
  const hasActive = playGroupState.typingStates.some(s => s.active);
  const hasMarkers = playGroupState.acceptMarkers.length > 0;
  
  if (!hasActive && !hasMarkers) {
    // 清理所有已完成的 typing 状态
    playGroupState.typingStates = [];
    
    // 所有打字完成且无确认标识 → 继续播放或结束
    if (playGroupState.currentIndex < blockList.length) {
      playGroupState.currentIndex++;
      playNextBlock();
    } else {
      // 所有积木处理完毕
      stopPlayingGroup();
      document.getElementById('statusText').textContent = '播放完成 | 快捷键: Ctrl+Z撤销 Ctrl+Y重做 Ctrl+A全选';
    }
  }
  // hasActive=true 或 hasMarkers=true → 等待
}

function skipTypewriter() {
  for (const ts of playGroupState.typingStates) {
    if (ts.active && ts.canSkip && !ts.skipRequested) {
      ts.skipRequested = true;
    }
  }
}

function playEventBlock(block) {
  const texts = block.texts || '';
  
  // 解析指令：@[指令名] 参数
  const match = texts.match(/^@\[(\w+)\]\s*([\s\S]*)$/);
  if (!match) {
    // 不是有效指令，跳过
    playGroupState.currentIndex++;
    playNextBlock();
    return;
  }
  
  const cmd = match[1];
  const param = match[2].trim();
  
  executeEventCommand(cmd, param);
}

function executeEventCommand(cmd, param) {
  if (!playGroupState.active) return;
  
  switch(cmd) {
    case 'wait':
      // 延迟固定时间（帧）
      const frames = parseInt(param) || 60;
      const delay = Math.max(frames * 16, 100); // 1帧 ≈ 16ms，最少100ms
      const timer1 = setTimeout(() => {
        if (playGroupState.active) {
          playGroupState.currentIndex++;
          playNextBlock();
        }
      }, delay);
      playGroupState.timers.push(timer1);
      break;
      
    case 'wait_random_in_range':
      // 延迟随机时间
      try {
        const data = JSON.parse(param);
        const min = data.value?.[0] || 30;
        const max = data.value?.[1] || 60;
        const randFrames = Math.floor(Math.random() * (max - min + 1)) + min;
        const randDelay = Math.max(randFrames * 16, 100);
        const timer2 = setTimeout(() => {
          if (playGroupState.active) {
            playGroupState.currentIndex++;
            playNextBlock();
          }
        }, randDelay);
        playGroupState.timers.push(timer2);
      } catch(e) {
        // 参数解析失败，跳过
        playGroupState.currentIndex++;
        playNextBlock();
      }
      break;
      
    case 'break':
      // 直接结束事件
      stopPlayingGroup();
      break;
      
    case 'clear_typed':
      // 精确清除所有播放期间渲染的字符（__PB__ 标记），不中断正在进行的打字动画
      clearPlaybackChars();
      playGroupState.currentIndex++;
      playNextBlock();
      break;
      
    default:
      // 其他指令（没有影响显示效果的跳过）
      playGroupState.currentIndex++;
      playNextBlock();
      break;
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard) navigator.clipboard.writeText(text);
  else {
    const ta = document.createElement('textarea'); ta.value = text; ta.style.position='fixed';ta.left='-9999px';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  }
}

  document.getElementById('blockCount').textContent = blockList.length;
}

// Drag event listeners on canvasWrapper (full preview area)
const canvasWrapper = document.getElementById('canvasWrapper');
canvasWrapper.addEventListener('mousedown', onCanvasMouseDown);
canvasWrapper.addEventListener('mousemove', onCanvasMouseMove);
canvasWrapper.addEventListener('mouseleave', onCanvasMouseLeave);
// Catch mouseup anywhere to finish drag even if cursor leaves wrapper
window.addEventListener('mouseup', onCanvasMouseUp);
// Track mouse globally during drag so overlay follows cursor outside wrapper
window.addEventListener('mousemove', (e) => {
  if (!draggedBlockId || !isDraggingPreview) return;
  const wrapperRect = canvasWrapper.getBoundingClientRect();
  const mx = e.clientX - wrapperRect.left - 30;
  const my = e.clientY - wrapperRect.top - 30;
  updateDragOverlay(mx, my);
});
// Block text selection during drag
canvasWrapper.addEventListener('selectstart', (e) => { if (draggedBlockId) e.preventDefault(); });
canvasWrapper.addEventListener('dragstart', (e) => { if (draggedBlockId) e.preventDefault(); });
